<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Certificates — FMM Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#020818;--bg1:#040d1e;--bg2:#071430;--bgc:#0a1a3a;
  --bdr:rgba(30,80,180,.22);--bdr2:rgba(60,130,255,.45);
  --blue:#2979ff;--blueg:#4d94ff;--bluel:#7ab3ff;--blueu:#00c3ff;
  --white:#fff;--txt:#e8f0ff;--txtm:#8baad4;--txtd:#3d5a8a;
  --ok:#00e676;--warn:#ffab40;--gold:#ffd700;
  --grad:linear-gradient(135deg,#1557e8,#2979ff,#00c3ff);
  --r:12px;
}
html{scroll-behavior:smooth}
body{background:var(--bg0);color:var(--txt);font-family:'Outfit',sans-serif;line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:100;background:rgba(2,8,24,.92);border-bottom:1px solid var(--bdr);backdrop-filter:blur(16px);padding:0 40px;height:70px;display:flex;align-items:center}
.ni{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1280px;margin:0 auto}
.logo{display:flex;align-items:center;gap:12px}
.lbox{background:var(--grad);width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#fff;letter-spacing:.05em}
.ltxt{display:flex;flex-direction:column;line-height:1}
.lm{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.12em;color:var(--white)}
.ls{font-size:.62rem;color:var(--txtm);letter-spacing:.15em}
.nl{display:flex;align-items:center;gap:8px;list-style:none}
.nl a{padding:8px 16px;border-radius:8px;font-size:.88rem;color:var(--txtm);transition:all .2s;font-weight:500}
.nl a:hover,.nl a.active{color:var(--white);background:rgba(41,121,255,.12)}
.ncta{background:var(--grad)!important;color:#fff!important;padding:8px 20px!important;border-radius:8px!important;font-weight:600!important}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#fff;cursor:pointer;border:2px solid rgba(41,121,255,.4)}
.hbg{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:4px}
.hbg span{display:block;width:22px;height:2px;background:var(--txtm);border-radius:2px}
@media(max-width:768px){
  .nl{display:none;position:fixed;inset:70px 0 0;background:rgba(2,8,24,.98);flex-direction:column;padding:24px;gap:4px;backdrop-filter:blur(20px)}
  .nl.open{display:flex}
  .nl a{padding:14px 20px;font-size:1rem}
  .hbg{display:flex}
  .nav{padding:0 20px}
}

/* ── MAIN ── */
main{max-width:1100px;margin:0 auto;padding:48px 28px 80px}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;padding:10px 22px;border-radius:10px;border:none;cursor:pointer;transition:all .22s;text-decoration:none}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 6px 24px rgba(41,121,255,.35)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(41,121,255,.5)}
.btn-ghost{background:transparent;border:1px solid var(--bdr2);color:var(--txtm)}
.btn-ghost:hover{border-color:var(--blue);color:var(--white)}
.btn-gold{background:linear-gradient(135deg,#b8860b,#ffd700);color:#000;font-weight:700}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,215,0,.35)}

.page-header{text-align:center;margin-bottom:48px}
.page-header h1{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--white);letter-spacing:.08em}
.page-header p{color:var(--txtm);margin-top:8px;font-size:.95rem}

.sec-title{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--txtm);letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ── CERT CARDS ── */
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;margin-bottom:48px}

/* EARNED cert */
.cert-card{
  background:linear-gradient(135deg,rgba(10,26,58,.97),rgba(7,20,48,.95));
  border:1px solid rgba(255,215,0,.25);border-radius:20px;
  padding:28px;position:relative;overflow:hidden;
  transition:all .25s;
}
.cert-card:hover{border-color:rgba(255,215,0,.5);transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 48px rgba(255,215,0,.08)}
.cert-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,215,0,.04),transparent 60%);
  pointer-events:none;
}
.cert-ribbon{
  position:absolute;top:16px;right:-28px;
  background:linear-gradient(135deg,#b8860b,#ffd700);
  color:#000;font-family:'Bebas Neue',sans-serif;font-size:.7rem;
  letter-spacing:.1em;padding:4px 40px;transform:rotate(35deg);
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.cert-icon{font-size:2.4rem;margin-bottom:14px}
.cert-course{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--white);letter-spacing:.05em;line-height:1.2;margin-bottom:6px}
.cert-date{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--gold);margin-bottom:16px}
.cert-desc{font-size:.85rem;color:var(--txtm);margin-bottom:20px;line-height:1.6}
.cert-actions{display:flex;gap:10px;flex-wrap:wrap}

/* LOCKED cert */
.cert-card.locked{
  border-color:rgba(41,121,255,.12);opacity:.65;
}
.cert-card.locked::before{background:none}
.locked-overlay{
  position:absolute;inset:0;border-radius:20px;
  background:rgba(2,8,24,.4);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;
}
.locked-overlay span{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--txtm)}
.locked-pct{
  background:rgba(41,121,255,.15);border:1px solid rgba(41,121,255,.25);
  padding:6px 16px;border-radius:100px;
  font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--bluel);
}

/* ── CERTIFICATE PREVIEW MODAL ── */
.cert-modal-overlay{
  position:fixed;inset:0;background:rgba(2,8,24,.92);
  backdrop-filter:blur(8px);z-index:400;
  display:none;align-items:center;justify-content:center;padding:20px;
  overflow-y:auto;
}
.cert-modal-overlay.open{display:flex}
.cert-modal-wrap{
  width:100%;max-width:860px;margin:auto;
}

/* ── THE ACTUAL CERTIFICATE (print-ready) ── */
.certificate{
  background:#fffdf5;color:#1a1a2e;
  border:12px solid transparent;
  border-image:linear-gradient(135deg,#b8860b,#ffd700,#b8860b) 1;
  border-radius:4px;
  padding:60px 72px;
  font-family:'Playfair Display',serif;
  position:relative;text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,.7);
}
.cert-corner{
  position:absolute;width:60px;height:60px;
  border-color:#b8860b;border-style:solid;
}
.cert-corner.tl{top:16px;left:16px;border-width:3px 0 0 3px}
.cert-corner.tr{top:16px;right:16px;border-width:3px 3px 0 0}
.cert-corner.bl{bottom:16px;left:16px;border-width:0 0 3px 3px}
.cert-corner.br{bottom:16px;right:16px;border-width:0 3px 3px 0}
.cert-logo-line{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.3em;color:#b8860b;margin-bottom:6px;text-transform:uppercase}
.cert-divider{width:120px;height:2px;background:linear-gradient(90deg,transparent,#b8860b,transparent);margin:0 auto 24px}
.cert-presents{font-style:italic;font-size:.95rem;color:#666;margin-bottom:8px}
.cert-student-name{
  font-family:'Bebas Neue',sans-serif;font-size:3rem;
  color:#1a1a2e;letter-spacing:.06em;line-height:1.1;
  border-bottom:2px solid #b8860b;padding-bottom:12px;
  margin:0 auto 16px;display:inline-block;min-width:300px;
}
.cert-has-completed{font-style:italic;font-size:1rem;color:#555;margin-bottom:8px}
.cert-course-name{
  font-family:'Bebas Neue',sans-serif;font-size:2rem;
  color:#1557e8;letter-spacing:.06em;margin-bottom:12px;
}
.cert-message{
  font-size:.92rem;color:#444;line-height:1.8;
  max-width:520px;margin:0 auto 32px;font-style:italic;
}
.cert-footer{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-top:32px;padding-top:24px;border-top:1px solid #e8d5a0;
}
.cert-sig{text-align:center}
.cert-sig-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:#1a1a2e;margin-top:8px}
.cert-sig-title{font-size:.78rem;color:#888;letter-spacing:.05em}
.cert-sig-line{width:140px;height:1px;background:#b8860b;margin:8px auto}
.cert-id{font-family:'JetBrains Mono',serif;font-size:.65rem;color:#aaa;text-align:center}
.cert-date-issued{font-size:.78rem;color:#888;text-align:center}
.cert-seal{
  width:80px;height:80px;border-radius:50%;
  border:3px solid #b8860b;
  background:linear-gradient(135deg,#fffaed,#fff8dc);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;font-size:.5rem;letter-spacing:.08em;
  color:#b8860b;font-family:'Bebas Neue',sans-serif;line-height:1.3;
  text-align:center;box-shadow:0 2px 12px rgba(184,134,11,.3);
}

/* Modal controls */
.cert-modal-controls{
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:24px;
}

/* ── CONGRATULATION MODAL ── */
.congrats-modal{
  position:fixed;inset:0;background:rgba(2,8,24,.9);
  backdrop-filter:blur(8px);z-index:500;
  display:none;align-items:center;justify-content:center;padding:20px;
}
.congrats-modal.open{display:flex}
.congrats-card{
  background:linear-gradient(135deg,rgba(10,26,58,.98),rgba(7,20,48,.96));
  border:1px solid rgba(255,215,0,.35);border-radius:24px;
  padding:48px 44px;max-width:520px;width:100%;text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,.7),0 0 80px rgba(255,215,0,.08);
  position:relative;
}
.congrats-emoji{font-size:4rem;margin-bottom:16px;animation:bounce .8s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.confetti{position:absolute;inset:0;border-radius:24px;overflow:hidden;pointer-events:none}
.confetti span{
  position:absolute;width:8px;height:8px;border-radius:2px;
  animation:fall 3s ease infinite;opacity:0;
}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0deg)}100%{opacity:0;transform:translateY(400px) rotate(360deg)}}
.congrats-card h2{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--gold);letter-spacing:.08em;margin-bottom:12px}
.congrats-card p{color:var(--txtm);font-size:.93rem;line-height:1.7;margin-bottom:24px}
.congrats-card strong{color:var(--white)}
.request-cert-btn{
  width:100%;padding:14px;font-size:1rem;
  background:linear-gradient(135deg,#b8860b,#ffd700);
  color:#000;border:none;border-radius:12px;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;letter-spacing:.08em;font-size:1.1rem;
  box-shadow:0 8px 28px rgba(255,215,0,.3);transition:all .2s;
}
.request-cert-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(255,215,0,.45)}
.skip-btn{
  background:none;border:none;color:var(--txtd);font-size:.82rem;
  cursor:pointer;margin-top:14px;font-family:'JetBrains Mono',monospace;
}
.skip-btn:hover{color:var(--txtm)}

/* ── TOAST ── */
.toast{position:fixed;bottom:32px;right:32px;background:linear-gradient(135deg,#1557e8,#2979ff);color:#fff;padding:14px 26px;border-radius:100px;font-weight:700;font-family:'JetBrains Mono',monospace;font-size:.84rem;box-shadow:0 8px 32px rgba(41,121,255,.5);z-index:9999;animation:slideUp .3s ease}
.toast.success{background:linear-gradient(135deg,#b8860b,#ffd700);color:#000}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media print{
  body > *:not(.cert-modal-overlay){display:none!important}
  .cert-modal-overlay{position:static!important;background:none!important;padding:0!important;display:block!important}
  .cert-modal-controls{display:none!important}
  .certificate{box-shadow:none!important;border:12px solid #b8860b!important}
}
@media(max-width:640px){
  main{padding:28px 16px 60px}
  .nav{padding:0 20px}
  .certificate{padding:36px 28px}
  .cert-student-name{font-size:2rem}
  .cert-footer{flex-direction:column;gap:20px;align-items:center}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="nav">
  <div class="ni">
    <a href="https://felixmogusu.github.io/Fullstack-Masterminds/" class="logo">
      <div class="lbox">FMM</div>
      <div class="ltxt"><span class="lm">FULLSTACK</span><span class="ls">MASTERMINDS</span></div>
    </a>
    <ul class="nl" id="nl">
      <li><a href="https://felixmogusu.github.io/Fullstack-Masterminds/pages/courses.html">Courses</a></li>
      <li><a href="https://felixmogusu.github.io/Fullstack-Masterminds/pages/dashboard.html">Dashboard</a></li>
      <li><a href="https://felixmogusu.github.io/Fullstack-Masterminds/pages/profile.html">Profile</a></li>
      <li><a href="https://felixmogusu.github.io/Fullstack-Masterminds/pages/certificates.html" class="active">Certificates</a></li>
      <li id="nav-instructor-li" style="display:none"><a href="https://felixmogusu.github.io/Fullstack-Masterminds/pages/instructor.html" class="ncta">Instructor Panel →</a></li>
      <li id="nav-signin-li"><a href="https://felixmogusu.github.io/Fullstack-Masterminds/pages/login.html">Sign In</a></li>
    </ul>
    <div id="nav-avatar" class="nav-avatar" style="display:none">S</div>
    <button class="hbg" id="hbg"><span></span><span></span><span></span></button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>🏆 MY CERTIFICATES</h1>
    <p id="page-sub">Complete a course to earn your certificate</p>
  </div>

  <div class="sec-title" id="earned-title" style="display:none">EARNED CERTIFICATES</div>
  <div class="cert-grid" id="earned-grid"></div>

  <div class="sec-title">ALL COURSES</div>
  <div class="cert-grid" id="all-grid"></div>
</main>

<!-- CERTIFICATE PREVIEW MODAL -->
<div class="cert-modal-overlay" id="cert-preview-modal">
  <div class="cert-modal-wrap">
    <div id="cert-render"></div>
    <div class="cert-modal-controls">
      <button class="btn btn-gold" onclick="window.print()">🖨 Print Certificate</button>
      <button class="btn btn-primary" onclick="requestCertByEmail()">📧 Request Official Certificate</button>
      <button class="btn btn-ghost" onclick="closeCertPreview()">✕ Close</button>
    </div>
  </div>
</div>

<!-- CONGRATULATIONS MODAL -->
<div class="congrats-modal" id="congrats-modal">
  <div class="congrats-card">
    <div class="confetti" id="confetti"></div>
    <div class="congrats-emoji">🎉</div>
    <h2>CONGRATULATIONS!</h2>
    <p id="congrats-msg">You have completed the course!</p>
    <button class="request-cert-btn" onclick="proceedToRequest()">🏆 Get My Certificate</button>
    <br>
    <button class="skip-btn" onclick="closeCongratsModal()">Maybe later</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://dtawdhstvcklwyngatwa.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0YXdkaHN0dmNrbHd5bmdhdHdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDY2OTMsImV4cCI6MjA4ODg4MjY5M30.VHFPpU3MkBOBBoJtCk4c_27CmnhIHkYZpPMc2AefqbA';

const COURSES = {
  'web-dev':   { name:'Website Development',        icon:'🌐', color:'#2979ff', total:13,
    message:'You have mastered the fundamentals of HTML, CSS, and JavaScript — the core languages that power the entire web. You are now equipped to build professional, responsive websites and web applications from scratch.' },
  'wordpress': { name:'WordPress Design',            icon:'🔷', color:'#7c4dff', total:9,
    message:'You have developed professional skills in WordPress, Elementor Pro, WooCommerce, and site security. You are now capable of designing, building, and maintaining world-class WordPress websites for clients.' },
  'seo':       { name:'SEO Mastery',                 icon:'🔍', color:'#00e676', total:9,
    message:'You have mastered the science and art of Search Engine Optimisation — from keyword research and on-page SEO to technical audits and link building. You have the skills to rank websites and drive organic traffic.' },
  'hosting':   { name:'Hosting & Maintenance',       icon:'🖥️', color:'#ffab40', total:7,
    message:'You have gained the technical expertise to professionally manage web hosting, domains, DNS, SSL certificates, and monthly maintenance plans. You can confidently manage and protect client websites.' },
  'ecommerce': { name:'E-Commerce Mastery',          icon:'🛒', color:'#ff5252', total:10,
    message:'You have completed a comprehensive journey through e-commerce strategy, WooCommerce, payment systems, conversion rate optimisation, and scaling. You are ready to build and grow profitable online stores.' },
};
const TOTALS = {'web-dev':13,'wordpress':9,'seo':9,'hosting':7,'ecommerce':10};

let sb, currentUser, currentProfile, paySettings = {}, activeCertCourse = null;

function getP(){try{return JSON.parse(localStorage.getItem('fmm_p')||'{}');}catch{return {};}}

window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('hbg').addEventListener('click',()=>document.getElementById('nl').classList.toggle('open'));

  if (window.supabase) sb = window.supabase.createClient(SB_URL, SB_KEY);

  if (sb) {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) { location.href = 'login.html'; return; }
    currentUser = user;

    const { data: profile } = await sb.from('profiles').select('full_name,email,role,created_at').eq('id',user.id).single();
    currentProfile = profile;

    if (profile && ['instructor','admin'].includes(profile.role)) {
      document.getElementById('nav-instructor-li').style.display = 'list-item';
    }
    const av = document.getElementById('nav-avatar');
    av.style.display = 'flex';
    av.textContent = (profile?.full_name || user.email || 'S')[0].toUpperCase();
    document.getElementById('nav-signin-li').style.display = 'none';

    // Sync progress from Supabase
    const { data: progData } = await sb.from('user_progress_summary').select('progress_data').eq('user_id',user.id).single();
    if (progData?.progress_data) localStorage.setItem('fmm_p', JSON.stringify(progData.progress_data));

    const { data: settings } = await sb.from('payment_settings').select('*').eq('id',1).single();
    if (settings) paySettings = settings;
  }

  renderCerts();

  // Check if arriving from a completed course
  const params = new URLSearchParams(location.search);
  const completedCourse = params.get('course');
  if (completedCourse && COURSES[completedCourse]) {
    const p = getP();
    const done = Object.values(p[completedCourse]||{}).flat().length;
    if (done >= TOTALS[completedCourse]) {
      activeCertCourse = completedCourse;
      showCongratsModal(completedCourse);
    }
  }
});

function renderCerts() {
  const p = getP();
  const earnedGrid = document.getElementById('earned-grid');
  const allGrid    = document.getElementById('all-grid');
  const earnedTitle = document.getElementById('earned-title');
  const earned = [];
  const notEarned = [];

  Object.entries(COURSES).forEach(([cid, info]) => {
    const done = Object.values(p[cid]||{}).flat().length;
    const pct  = Math.round(done/info.total*100);
    if (done >= info.total) earned.push({ cid, info, done, pct });
    else notEarned.push({ cid, info, done, pct });
  });

  if (earned.length) {
    earnedTitle.style.display = 'flex';
    document.getElementById('page-sub').textContent =
      `You have earned ${earned.length} certificate${earned.length>1?'s':''}. Keep going!`;
    earnedGrid.innerHTML = earned.map(({cid,info,done,pct}) => buildEarnedCard(cid,info,pct)).join('');
  }

  allGrid.innerHTML = notEarned.map(({cid,info,done,pct}) => buildLockedCard(cid,info,done,pct)).join('');
}

function buildEarnedCard(cid, info, pct) {
  const dateStr = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  return `
    <div class="cert-card">
      <div class="cert-ribbon">EARNED</div>
      <div class="cert-icon">${info.icon}</div>
      <div class="cert-course">${info.name}</div>
      <div class="cert-date">Completed · ${dateStr}</div>
      <div class="cert-desc">${info.message.slice(0,100)}…</div>
      <div class="cert-actions">
        <button class="btn btn-gold" onclick="openCertPreview('${cid}')">🏆 View Certificate</button>
        <button class="btn btn-ghost" onclick="requestCertByEmailForCourse('${cid}')">📧 Request Official</button>
      </div>
    </div>`;
}

function buildLockedCard(cid, info, done, pct) {
  return `
    <div class="cert-card locked" style="cursor:default">
      <div class="cert-icon">${info.icon}</div>
      <div class="cert-course">${info.name}</div>
      <div class="cert-desc">Complete all ${info.total} lessons to earn this certificate.</div>
      <div style="height:5px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden;margin:12px 0">
        <div style="height:100%;width:${pct}%;background:${info.color};border-radius:100px"></div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--txtm)">${done}/${info.total} lessons · ${pct}%</div>
      <a href="lesson.html?course=${cid}" class="btn btn-ghost" style="margin-top:14px;font-size:.82rem">Continue Learning →</a>
    </div>`;
}

// ── CERTIFICATE PREVIEW ──────────────────────────────────────────
function openCertPreview(cid) {
  activeCertCourse = cid;
  const name = currentProfile?.full_name || currentUser?.email?.split('@')[0] || 'Student';
  const info = COURSES[cid];
  const certId = 'FMM-' + cid.toUpperCase().replace('-','') + '-' + Date.now().toString(36).toUpperCase();
  const dateStr = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const instrName = paySettings.mpesa_name || 'Felix Mogusu';

  document.getElementById('cert-render').innerHTML = buildCertificate(name, info, certId, dateStr, instrName);
  document.getElementById('cert-preview-modal').classList.add('open');
}

function buildCertificate(studentName, courseInfo, certId, dateStr, instrName) {
  return `
    <div class="certificate" id="the-certificate">
      <div class="cert-corner tl"></div>
      <div class="cert-corner tr"></div>
      <div class="cert-corner bl"></div>
      <div class="cert-corner br"></div>

      <div class="cert-logo-line">FMM — Fullstack Masterminds Academy</div>
      <div class="cert-divider"></div>

      <div class="cert-presents">This is to certify that</div>
      <div class="cert-student-name">${studentName}</div>
      <div class="cert-has-completed">has successfully completed the</div>
      <div class="cert-course-name">${courseInfo.icon} ${courseInfo.name}</div>
      <div class="cert-divider"></div>

      <div class="cert-message">${courseInfo.message}</div>

      <div class="cert-footer">
        <div class="cert-sig">
          <div style="font-size:1.6rem;font-family:'Playfair Display',serif;font-style:italic;color:#b8860b">${instrName}</div>
          <div class="cert-sig-line"></div>
          <div class="cert-sig-name">${instrName}</div>
          <div class="cert-sig-title">Lead Instructor, FMM Academy</div>
        </div>
        <div class="cert-seal">
          <div style="font-size:1.4rem">🏆</div>
          <div>FMM</div>
          <div>CERTIFIED</div>
        </div>
        <div>
          <div class="cert-date-issued">Issued: ${dateStr}</div>
          <div class="cert-id" style="margin-top:6px">ID: ${certId}</div>
        </div>
      </div>
    </div>`;
}

function closeCertPreview() {
  document.getElementById('cert-preview-modal').classList.remove('open');
}

function requestCertByEmail() {
  requestCertByEmailForCourse(activeCertCourse);
}

function requestCertByEmailForCourse(cid) {
  const info = COURSES[cid];
  const instEmail = paySettings.contact_email || 'contact@fmm.co.ke';
  const name = currentProfile?.full_name || currentUser?.email?.split('@')[0] || 'Student';
  const dateStr = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  const subject = encodeURIComponent(`🏆 Certificate Request — ${info.name} | ${name}`);
  const body = encodeURIComponent(
    `Dear Instructor,\n\n` +
    `I have successfully completed the ${info.name} course on FMM Academy and would like to request my official certificate.\n\n` +
    `Student Details:\n` +
    `Name:        ${name}\n` +
    `Email:       ${currentUser?.email || ''}\n` +
    `Course:      ${info.name}\n` +
    `Completed:   ${dateStr}\n\n` +
    `Please send my certificate to this email address.\n\n` +
    `Thank you!\n${name}`
  );

  window.open(`mailto:${instEmail}?subject=${subject}&body=${body}`);
  closeCertPreview();
  showToast('✅ Certificate request opened in your email app!', 'success');
}

// ── CONGRATS MODAL ───────────────────────────────────────────────
function showCongratsModal(cid) {
  const info = COURSES[cid];
  const name = currentProfile?.full_name || 'there';
  document.getElementById('congrats-msg').innerHTML =
    `Well done, <strong>${name.split(' ')[0]}</strong>! 🎉<br>
     You have completed <strong>${info.name}</strong>.<br><br>
     ${info.message}`;
  spawnConfetti();
  document.getElementById('congrats-modal').classList.add('open');
}

function closeCongratsModal() {
  document.getElementById('congrats-modal').classList.remove('open');
}

function proceedToRequest() {
  closeCongratsModal();
  if (activeCertCourse) openCertPreview(activeCertCourse);
}

function spawnConfetti() {
  const colors = ['#ffd700','#2979ff','#00e676','#ff5252','#00c3ff'];
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  for (let i = 0; i < 24; i++) {
    const el = document.createElement('span');
    el.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-delay:${Math.random()*2}s;
      animation-duration:${2+Math.random()*2}s;
    `;
    container.appendChild(el);
  }
}

function showToast(msg, type) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = document.createElement('div');
  t.className = 'toast'+(type==='success'?' success':'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeCertPreview(); closeCongratsModal(); }
});
</script>
</body>
</html>
