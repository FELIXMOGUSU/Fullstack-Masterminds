<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lesson — FMM Fullstack Masterminds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --bg0:#020818;--bg1:#040d1e;--bg2:#071430;--bgc:#0a1a3a;
  --bdr:rgba(30,80,180,.22);--bdr2:rgba(60,130,255,.45);
  --blue:#2979ff;--blueg:#4d94ff;--bluel:#7ab3ff;--blueu:#00c3ff;
  --white:#fff;--txt:#e8f0ff;--txtm:#8baad4;--txtd:#3d5a8a;
  --grad:linear-gradient(135deg,#1557e8,#2979ff,#00c3ff);
  --gradc:linear-gradient(135deg,rgba(10,26,58,.92),rgba(7,20,48,.96));
  --r:12px;--r2:20px;--r3:28px;
  --sh:0 8px 40px rgba(0,0,0,.5);
  --glow:0 0 40px rgba(41,121,255,.3);
  --sbtn:0 6px 28px rgba(41,121,255,.45);
  --tr:all .3s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg0);color:var(--txt);font-family:'Outfit',sans-serif;line-height:1.6;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* CIRCUIT */
.cir{position:absolute;inset:0;background-image:linear-gradient(rgba(41,121,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(41,121,255,.035) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse 90% 90% at 50% 0%,#000 20%,transparent 80%);pointer-events:none;z-index:0}

/* LOGO */
.logo{display:flex;align-items:center;gap:12px}
.lbox{width:42px;height:42px;background:var(--grad);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:#fff;letter-spacing:.03em;box-shadow:0 4px 16px rgba(41,121,255,.5);flex-shrink:0}
.ltxt{display:flex;flex-direction:column;line-height:1.1}
.lm{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.12em;color:#fff}
.ls{font-size:.61rem;letter-spacing:.18em;color:var(--bluel);font-weight:500;text-transform:uppercase}

/* GRAD TEXT */
.gt{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(2,8,24,.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);transition:var(--tr)}
.nav.sc{background:rgba(2,8,24,.97);box-shadow:0 4px 40px rgba(0,0,0,.6)}
.ni{display:flex;align-items:center;justify-content:space-between;height:70px;max-width:1180px;margin:0 auto;padding:0 28px}
.nl{display:flex;align-items:center;gap:4px;list-style:none}
.nl a{padding:8px 16px;border-radius:8px;font-size:.9rem;font-weight:500;color:var(--txtm);transition:var(--tr)}
.nl a:hover{color:#fff}
.ncta{padding:9px 22px!important;background:var(--grad)!important;color:#fff!important;border-radius:100px!important;font-weight:700!important;box-shadow:var(--sbtn)}
.ncta:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(41,121,255,.55)!important}
.hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.hbg span{display:block;width:22px;height:2px;background:var(--txtm);border-radius:2px;transition:var(--tr)}

/* WRAP + SECTION */
.w{max-width:1180px;margin:0 auto;padding:0 28px}
.sec{padding:96px 0}
.ey{font-family:'JetBrains Mono',monospace;font-size:.71rem;letter-spacing:.22em;color:var(--blue);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.ey::before{content:'';display:inline-block;width:28px;height:2px;background:var(--blue)}
.st{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,3.6rem);letter-spacing:.04em;line-height:1.05;margin-bottom:16px}
.ss{color:var(--txtm);font-size:1.05rem;max-width:540px;line-height:1.75;margin-bottom:52px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border-radius:100px;font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;border:none;transition:var(--tr);white-space:nowrap}
.bp{background:var(--grad);color:#fff;box-shadow:var(--sbtn)}
.bp:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(41,121,255,.55)}
.bo{background:transparent;color:#fff;border:2px solid rgba(41,121,255,.5)}
.bo:hover{border-color:var(--blue);color:var(--blueg);transform:translateY(-2px)}
.bg{background:rgba(41,121,255,.1);color:var(--bluel);border:1px solid var(--bdr)}
.bg:hover{background:rgba(41,121,255,.2);border-color:var(--bdr2)}
.blg{padding:17px 40px;font-size:1.05rem}
.bfw{width:100%;justify-content:center}
.ar{transition:transform .2s}
.btn:hover .ar{transform:translateX(5px)}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;position:relative;padding-top:70px;overflow:hidden;background:var(--bg0)}
.orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}
.o1{width:700px;height:700px;background:rgba(21,87,232,.12);top:-200px;left:-200px}
.o2{width:500px;height:500px;background:rgba(0,195,255,.07);bottom:-100px;right:-100px}
.o3{width:400px;height:400px;background:rgba(41,121,255,.1);top:30%;right:15%}
.hg{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:60px 28px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.hbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(41,121,255,.12);border:1px solid rgba(41,121,255,.3);border-radius:100px;padding:7px 18px;font-size:.79rem;font-family:'JetBrains Mono',monospace;color:var(--bluel);margin-bottom:28px}
.pulse{width:7px;height:7px;background:var(--blueu);border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 8px var(--blueu)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)}}
.ht{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,5.5rem);line-height:1.0;letter-spacing:.04em;margin-bottom:24px}
.hs{font-size:1.1rem;color:var(--txtm);line-height:1.8;max-width:480px;margin-bottom:40px}
.ha{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:48px}
.hf{display:flex;flex-direction:column;gap:11px}
.hfi{display:flex;align-items:center;gap:12px;font-size:.91rem;color:var(--txtm)}
.chk{width:22px;height:22px;background:rgba(41,121,255,.15);border:1px solid rgba(41,121,255,.35);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.69rem;color:var(--blue);flex-shrink:0}

/* STATS CARD */
.sc2{background:var(--gradc);border:1px solid var(--bdr);border-radius:var(--r3);padding:36px;box-shadow:var(--sh),inset 0 1px 0 rgba(255,255,255,.05);position:relative;overflow:hidden}
.sc2::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(41,121,255,.5),transparent)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px}
.si{text-align:center}
.sn{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.02em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.sl{font-size:.79rem;color:var(--txtm);margin-top:4px;font-weight:500}
.ms{display:flex;flex-direction:column;gap:10px}
.mi{display:flex;align-items:center;gap:12px;background:rgba(41,121,255,.06);border:1px solid var(--bdr);border-radius:12px;padding:12px 16px;transition:var(--tr)}
.mi:hover{border-color:var(--bdr2);background:rgba(41,121,255,.1)}
.mn{font-size:.84rem;font-weight:600;margin-bottom:2px}
.mb{font-family:'JetBrains Mono',monospace;font-size:.69rem;color:var(--bluel)}

/* COURSE CARDS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
.cc{background:var(--gradc);border:1px solid var(--bdr);border-radius:var(--r3);padding:32px;transition:var(--tr);position:relative}
.cc:hover{border-color:var(--bdr2);transform:translateY(-6px);box-shadow:var(--sh),var(--glow)}
.cc.hot{border-color:rgba(41,121,255,.4)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.ci{width:56px;height:56px;background:rgba(41,121,255,.12);border:1px solid rgba(41,121,255,.25);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem}
.cl{font-family:'JetBrains Mono',monospace;font-size:.67rem;letter-spacing:.1em;padding:4px 12px;border-radius:100px;background:rgba(41,121,255,.1);border:1px solid var(--bdr);color:var(--bluel)}
.cc h3{font-size:1.2rem;font-weight:700;margin-bottom:10px;line-height:1.3}
.cc p{color:var(--txtm);font-size:.88rem;line-height:1.65;margin-bottom:20px}
.cm{display:flex;gap:14px;font-size:.77rem;color:var(--txtd);font-family:'JetBrains Mono',monospace;margin-bottom:16px}
.pb{background:rgba(41,121,255,.08);border-radius:100px;height:5px;overflow:hidden;margin-bottom:18px}
.pf{height:100%;background:var(--grad);border-radius:100px;transition:width 1s ease}
.cf{display:flex;justify-content:space-between;align-items:center}
.ck{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;color:var(--blue);transition:var(--tr)}
.ck:hover{gap:10px;color:var(--bluel)}
.cp{font-family:'JetBrains Mono',monospace;font-size:.77rem;color:var(--txtd)}

/* HOW IT WORKS */
.hiw{background:var(--bg2);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr)}
.steps{display:grid;grid-template-columns:repeat(4,1fr);position:relative}
.steps::before{content:'';position:absolute;top:36px;left:12%;right:12%;height:1px;background:linear-gradient(90deg,transparent,var(--bdr2),transparent);z-index:0}
.step{padding:0 20px;text-align:center;position:relative;z-index:1}
.sr{width:72px;height:72px;background:var(--bgc);border:2px solid var(--bdr);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;position:relative;transition:var(--tr)}
.step:hover .sr{border-color:var(--blue);box-shadow:0 0 24px rgba(41,121,255,.4)}
.snum{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sic{position:absolute;top:-8px;right:-8px;font-size:1rem}
.step h3{font-size:.98rem;font-weight:700;margin-bottom:10px}
.step p{color:var(--txtm);font-size:.84rem;line-height:1.65}

/* TESTIMONIALS */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
.tc{background:var(--gradc);border:1px solid var(--bdr);border-radius:var(--r3);padding:32px;transition:var(--tr);position:relative}
.tc::before{content:'"';position:absolute;top:16px;right:24px;font-family:'Bebas Neue',sans-serif;font-size:5rem;color:rgba(41,121,255,.07);line-height:1}
.tc:hover{border-color:var(--bdr2);transform:translateY(-4px)}
.tc.hot{border-color:rgba(41,121,255,.35)}
.ts{color:#ffd700;font-size:.85rem;letter-spacing:2px;margin-bottom:16px}
.tc p{color:var(--txtm);font-size:.92rem;line-height:1.75;margin-bottom:24px;font-style:italic}
.ta{display:flex;align-items:center;gap:12px}
.tav{width:42px;height:42px;background:var(--grad);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.77rem;font-weight:800;color:#fff;flex-shrink:0}
.ta strong{display:block;font-size:.9rem}
.ta small{color:var(--txtd);font-size:.77rem}

/* CTA */
.ctas{padding:100px 0;position:relative;overflow:hidden;text-align:center}
.ctag{position:absolute;width:800px;height:400px;background:radial-gradient(ellipse,rgba(41,121,255,.14),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

/* FOOTER */
.ft{background:var(--bg1);border-top:1px solid var(--bdr);padding:72px 0 32px}
.fg{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:48px;margin-bottom:56px}
.fb p{color:var(--txtm);font-size:.87rem;margin-top:16px;line-height:1.7;max-width:260px}
.fc h4{font-weight:700;font-size:.86rem;margin-bottom:18px;color:#fff;letter-spacing:.05em;text-transform:uppercase}
.fc a{display:block;color:var(--txtm);font-size:.86rem;margin-bottom:10px;transition:var(--tr)}
.fc a:hover{color:var(--blue);transform:translateX(4px)}
.fb2{border-top:1px solid var(--bdr);padding-top:28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;max-width:1180px;margin:0 auto;padding-left:28px;padding-right:28px}
.fb2 span{font-size:.81rem;color:var(--txtd)}

/* AUTH PAGE */
.ap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;position:relative;overflow:hidden}
.ao{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}
.ao1{width:500px;height:500px;background:rgba(21,87,232,.1);top:-100px;left:-200px}
.ao2{width:400px;height:400px;background:rgba(0,195,255,.06);bottom:-100px;right:-100px}
.ac{position:relative;z-index:1;background:var(--gradc);border:1px solid var(--bdr);border-radius:var(--r3);padding:52px 48px;width:100%;max-width:480px;box-shadow:var(--sh),0 0 60px rgba(0,0,0,.5)}
.ac::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(41,121,255,.5),transparent);border-radius:var(--r3) var(--r3) 0 0}
.alo{text-align:center;margin-bottom:36px}
.at{font-family:'Bebas Neue',sans-serif;font-size:2.1rem;letter-spacing:.04em;text-align:center;margin-bottom:8px}
.as2{text-align:center;color:var(--txtm);font-size:.91rem;margin-bottom:36px}
.fg2{margin-bottom:20px}
.fl{display:block;font-family:'JetBrains Mono',monospace;font-size:.71rem;letter-spacing:.12em;color:var(--txtm);margin-bottom:9px;text-transform:uppercase}
.fi{width:100%;background:rgba(7,20,48,.8);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 18px;color:#fff;font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:var(--tr)}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(41,121,255,.15)}
.fi::placeholder{color:var(--txtd)}
.adv{display:flex;align-items:center;gap:14px;margin:24px 0}
.adv::before,.adv::after{content:'';flex:1;height:1px;background:var(--bdr)}
.adv span{font-size:.74rem;color:var(--txtd)}
.aft{text-align:center;margin-top:24px;font-size:.87rem;color:var(--txtm)}
.aft a{color:var(--blue);font-weight:600}
.alert{padding:13px 18px;border-radius:var(--r);font-size:.87rem;margin-bottom:20px;display:none}
.alert.show{display:block}
.ae{background:rgba(220,50,50,.1);border:1px solid rgba(220,50,50,.3);color:#ff6b6b}
.aok{background:rgba(41,121,255,.1);border:1px solid rgba(41,121,255,.35);color:var(--bluel)}
.fgt{text-align:right;margin-top:-12px;margin-bottom:20px}
.fgt a{font-size:.79rem;color:var(--blue)}

/* DASHBOARD */
.dw{min-height:100vh;background:var(--bg0);padding-top:70px}
.dl{display:flex;min-height:calc(100vh - 70px)}
.sb{width:268px;background:var(--bg1);border-right:1px solid var(--bdr);padding:28px 0;position:sticky;top:70px;height:calc(100vh - 70px);overflow-y:auto;flex-shrink:0}
.sbu{padding:0 20px 24px;border-bottom:1px solid var(--bdr);margin-bottom:20px;display:flex;align-items:center;gap:12px}
.sbav{width:42px;height:42px;background:var(--grad);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff;flex-shrink:0}
.sbn{font-weight:700;font-size:.9rem}
.sbr{font-size:.72rem;color:var(--txtd);font-family:'JetBrains Mono',monospace}
.sbl{font-family:'JetBrains Mono',monospace;font-size:.64rem;letter-spacing:.2em;color:var(--txtd);padding:0 20px;margin:20px 0 8px;text-transform:uppercase}
.sba{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:.87rem;font-weight:500;color:var(--txtm);transition:var(--tr);border-left:3px solid transparent;margin:1px 0;cursor:pointer}
.sba:hover{color:#fff;background:rgba(41,121,255,.06)}
.sba.on{color:#fff;background:rgba(41,121,255,.1);border-left-color:var(--blue)}
.dm{flex:1;padding:40px 44px;overflow-y:auto}
.dto{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;flex-wrap:wrap;gap:16px}
.dg h1{font-family:'Bebas Neue',sans-serif;font-size:2.1rem;letter-spacing:.04em;margin-bottom:4px}
.dg p{color:var(--txtm);font-size:.9rem}
.dd{font-family:'JetBrains Mono',monospace;font-size:.77rem;color:var(--txtd);padding:8px 16px;background:var(--bgc);border:1px solid var(--bdr);border-radius:100px}
.kr{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;margin-bottom:40px}
.kc{background:var(--gradc);border:1px solid var(--bdr);border-radius:var(--r2);padding:24px;transition:var(--tr);position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:.6}
.kc:hover{border-color:var(--bdr2);transform:translateY(-3px)}
.ki{font-size:1.6rem;margin-bottom:12px}
.kv{font-family:'Bebas Neue',sans-serif;font-size:2.3rem;letter-spacing:.03em;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.kl{font-size:.79rem;color:var(--txtm);margin-top:5px;font-weight:500}
.sh{font-size:1.25rem;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-bottom:44px}
.ec{background:var(--gradc);border:1px solid var(--bdr);border-radius:var(--r2);padding:24px;cursor:pointer;transition:var(--tr)}
.ec:hover{border-color:var(--bdr2);transform:translateY(-4px);box-shadow:var(--sh)}
.et{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.eic{font-size:1.8rem}
.ep{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--bluel);background:rgba(41,121,255,.12);padding:4px 11px;border-radius:100px;border:1px solid var(--bdr)}
.etl{font-weight:700;font-size:.96rem;margin-bottom:16px}
.pt{background:rgba(41,121,255,.08);border-radius:100px;height:5px;overflow:hidden}
.pf2{height:100%;background:var(--grad);border-radius:100px;transition:width 1.2s ease}
.ef{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.em{font-family:'JetBrains Mono',monospace;font-size:.71rem;color:var(--txtd)}
.er{font-size:.79rem;font-weight:600;color:var(--blue);transition:var(--tr)}
.dg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.dc{background:var(--gradc);border:1px solid var(--bdr);border-radius:var(--r2);padding:20px;transition:var(--tr)}
.dc:hover{border-color:var(--bdr2)}
.dic{font-size:1.6rem;margin-bottom:10px}
.dn2{font-weight:700;font-size:.87rem;margin-bottom:4px}
.dm2{font-size:.74rem;color:var(--txtd);margin-bottom:14px}
.dl2{font-size:.79rem;color:var(--blue);display:inline-flex;align-items:center;gap:5px;font-weight:600;transition:var(--tr)}
.dl2:hover{gap:9px}
.da{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;border:1px dashed var(--bdr);border-radius:var(--r2);padding:28px;color:var(--txtd);font-size:.82rem}

/* LESSON */
.lw{min-height:100vh;background:var(--bg0);padding-top:70px}
.ll{display:flex;min-height:calc(100vh - 70px)}
.lsb{width:300px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bdr);overflow-y:auto;position:sticky;top:70px;height:calc(100vh - 70px)}
.lsh{padding:24px 20px;border-bottom:1px solid var(--bdr);background:rgba(41,121,255,.04)}
.lsc{font-weight:800;font-size:.94rem;margin-bottom:12px}
.lsp{font-family:'JetBrains Mono',monospace;font-size:.71rem;color:var(--bluel);margin-bottom:8px;display:flex;justify-content:space-between}
.mg{border-bottom:1px solid var(--bdr)}
.mt{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;cursor:pointer;font-size:.87rem;font-weight:600;transition:var(--tr);user-select:none}
.mt:hover{background:rgba(41,121,255,.05);color:var(--bluel)}

function initSB(){

function initNav(){
  const nav=document.getElementById('nav');
  const hbg=document.getElementById('hbg');
  const nl=document.getElementById('nl');
  window.addEventListener('scroll',()=>nav&&nav.classList.toggle('sc',scrollY>30));
  hbg&&hbg.addEventListener('click',()=>nl&&nl.classList.toggle('op'));
  document.addEventListener('click',e=>{if(nl&&nl.classList.contains('op')&&!nav.contains(e.target))nl.classList.remove('op');});
}

function initReveal(){
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach((e,i)=>{if(!e.isIntersecting)return;setTimeout(()=>e.target.classList.add('vis'),i*70);obs.unobserve(e.target);});
  },{threshold:.1});
  document.querySelectorAll('.fu,.cc,.step,.tc,.kc,.ec').forEach(el=>{el.classList.add('fu');obs.observe(el);});
}

function initCounters(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const el=e.target,target=+el.dataset.n;let t0=null;
      const tick=ts=>{if(!t0)t0=ts;const p=Math.min((ts-t0)/1800,1),ease=1-Math.pow(1-p,3);el.textContent=Math.floor(ease*target);if(p<1)requestAnimationFrame(tick);else el.textContent=target;};
      requestAnimationFrame(tick);obs.unobserve(el);
    });
  },{threshold:.5});
  document.querySelectorAll('[data-n]').forEach(el=>obs.observe(el));
}

function getP(){try{return JSON.parse(localStorage.getItem('fmm_p')||'{}');}catch{return {};}}
function saveP(d){localStorage.setItem('fmm_p',JSON.stringify(d));syncP(d);}
async function syncP(d){if(!sb)return;try{const{data:{user}}=await sb.auth.getUser();if(!user)return;const meta=user.user_metadata||{};await sb.from('user_progress_summary').upsert({user_id:user.id,progress_data:d,full_name:meta.full_name||'',email:user.email||'',updated_at:new Date().toISOString()});}catch(e){}}
async function loadP(){if(!sb)return;try{const{data:{user}}=await sb.auth.getUser();if(!user)return;const{data}=await sb.from('user_progress_summary').select('progress_data').eq('user_id',user.id).single();if(data?.progress_data)saveP(data.progress_data);}catch(e){}}

function markDone(cid,mid,lid){const p=getP();if(!p[cid])p[cid]={};if(!p[cid][mid])p[cid][mid]=[];if(!p[cid][mid].includes(lid))p[cid][mid].push(lid);saveP(p);return getPct(cid);}
function isLessonDone(cid, mod, lid) {
  const p = getP();
  return (p[cid]?.[mod] || []).includes(lid);
}

function showLockToast(msg) {
  // Remove any existing toast
  document.querySelectorAll('.fmm-lock-toast').forEach(t => t.remove());
  const toast = document.createElement('div');
  toast.className = 'fmm-lock-toast';
  toast.style.cssText = 'position:fixed;bottom:32px;right:32px;background:linear-gradient(135deg,#c62828,#e53935);color:#fff;padding:14px 26px;border-radius:100px;font-weight:700;font-family:"JetBrains Mono",monospace;font-size:.84rem;box-shadow:0 8px 32px rgba(229,57,53,.5);z-index:9999;display:flex;align-items:center;gap:10px';
  toast.innerHTML = '🔒 ' + (msg || 'Score 70% on the quiz to unlock the next lesson');
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

function getPct(cid){const p=getP(),done=Object.values(p[cid]||{}).flat().length;return Math.round((done/(TOTALS[cid]||1))*100);}
function getOverall(){const tot=Object.values(TOTALS).reduce((a,b)=>a+b,0),done=Object.values(getP()).reduce((s,m)=>s+Object.values(m).flat().length,0);return Math.round((done/tot)*100);}
function getTotalDone(){return Object.values(getP()).reduce((s,m)=>s+Object.values(m).flat().length,0);}

function renderProgress(){
  Object.keys(TOTALS).forEach(cid=>{
    const v=getPct(cid);
    document.querySelectorAll('[data-cid="'+cid+'"] .pf,[data-cid="'+cid+'"] .pf2').forEach(el=>setTimeout(()=>el.style.width=v+'%',400));
    document.querySelectorAll('[data-cpct="'+cid+'"]').forEach(el=>el.textContent=v+'% complete');
    document.querySelectorAll('[data-epct="'+cid+'"]').forEach(el=>el.textContent=v+'%');
  });
}

function showAlert(id,type,msg){const el=document.getElementById(id);if(!el)return;el.className='alert '+(type==='ok'?'aok':'ae')+' show';el.textContent=msg;}
function setBtn(id,txt,dis){const b=document.getElementById(id);if(!b)return;b.textContent=txt;b.disabled=dis;}
const delay=ms=>new Promise(r=>setTimeout(r,ms));

async function doLogin(e){
  e.preventDefault();
  const email=document.getElementById('email').value.trim(),pass=document.getElementById('pass').value;
  if(!email||!pass){showAlert('alert','err','Please enter your email and password.');return;}
  setBtn('sbtn','Signing in…',true);
  if(!sb){await delay(700);localStorage.setItem('fmm_user',JSON.stringify({email,name:email.split('@')[0]}));showAlert('alert','ok','Welcome back! Redirecting…');setTimeout(()=>location.href='https://felixmogusu.github.io/Fullstack-Masterminds/pages/dashboard.html',900);return;}
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showAlert('alert','err',error.message);setBtn('sbtn','Sign In',false);}
  else{showAlert('alert','ok','Signed in! Redirecting…');setTimeout(()=>location.href='https://felixmogusu.github.io/Fullstack-Masterminds/pages/dashboard.html',800);}
}

async function doRegister(e){
  e.preventDefault();
  const name=document.getElementById('rname').value.trim(),email=document.getElementById('email').value.trim(),pass=document.getElementById('pass').value,conf=document.getElementById('conf').value;
  if(!name||!email||!pass){showAlert('alert','err','Please fill in all fields.');return;}
  if(pass.length<6){showAlert('alert','err','Password must be at least 6 characters.');return;}
  if(pass!==conf){showAlert('alert','err','Passwords do not match.');return;}
  setBtn('sbtn','Creating account…',true);
  if(!sb){await delay(800);localStorage.setItem('fmm_user',JSON.stringify({email,name}));showAlert('alert','ok','Account created! Taking you to your dashboard…');setTimeout(()=>location.href='https://felixmogusu.github.io/Fullstack-Masterminds/pages/dashboard.html',1100);return;}

class Quiz{
  constructor(qs,id){this.qs=qs;this.el=document.getElementById(id);this.i=0;this.score=0;this.ans=false;if(this.el)this.render();}
  render(){
    const q=this.qs[this.i],tot=this.qs.length,pct=Math.round(this.i/tot*100);
    this.el.innerHTML=`<div class="qto"><div class="qh">🧠 Module Quiz</div><div class="qc">Q${this.i+1}/${tot}</div></div>
<div class="qb"><div class="qbf" style="width:${pct}%"></div></div>
<div class="qt">${q.q}</div>
<div class="qo">${q.opts.map((o,i)=>`<button class="qob" onclick="FQ.pick(${i})"><span class="ql">${'ABCD'[i]}</span>${o}</button>`).join('')}</div>
<button class="btn bp" id="qnxt" style="display:none" onclick="FQ.next()">${this.i===tot-1?'See Results':'Next Question'} <span class="ar">→</span></button>`;
  }
  pick(i){if(this.ans)return;this.ans=true;const c=this.qs[this.i].ans;this.el.querySelectorAll('.qob').forEach(b=>b.disabled=true);this.el.querySelectorAll('.qob')[i].classList.add(i===c?'ok':'no');if(i!==c)this.el.querySelectorAll('.qob')[c].classList.add('ok');if(i===c)this.score++;document.getElementById('qnxt').style.display='inline-flex';}
  next(){this.ans=false;this.i++;if(this.i>=this.qs.length)this.result();else this.render();}
  result(){
    const p=Math.round(this.score/this.qs.length*100),ok=p>=70;
    this.el.innerHTML=`<div class="qr show"><div style="font-size:2.5rem;margin-bottom:12px">${ok?'🏆':'📚'}</div><div class="qsc">${p}%</div><p class="qrl">${this.score}/${this.qs.length} correct</p><p style="color:var(--txtm);margin-bottom:28px;font-size:.91rem">${ok?'Excellent! You passed.':'Need 70% to pass — keep studying!'}</p>${ok?'<button class="btn bp" onclick="fmmComplete()">Mark Complete &amp; Continue <span class="ar">→</span></button>':'<button class="btn bg" onclick="FQ.restart()">Retry Quiz</button>'}</div>`;
  }
  restart(){this.i=0;this.score=0;this.ans=false;this.render();}
}

async function loadNotes(lessonId, baseNotes){
  // Always show the lesson's built-in notes first
  const el  = document.getElementById('ncontent');
  const ts  = document.getElementById('nts');
  const nb  = document.querySelector('.nb');
  if(!el) return;

  // Inject built-in lesson notes from curriculum
  if(baseNotes){
    el.innerHTML = baseNotes;
    if(nb) nb.style.display = 'block';
  } else {
    // No built-in notes — hide the section entirely
    if(nb) nb.style.display = 'none';
    return;
  }

  // If Supabase connected, check for ADDITIONAL instructor override notes
  if(!sb) return; // No Supabase — just show built-in notes, done
  try{
    const{data} = await sb.from('lesson_notes')
      .select('content,updated_at')
      .eq('lesson_id', lessonId)
      .single();
    if(data && data.content){
      // Instructor has added/overridden notes in Supabase — append after built-in notes
      el.innerHTML = baseNotes + 
        '<div style="margin-top:20px;padding-top:20px;border-top:1px solid rgba(41,121,255,0.2)">' +
        '<p style="color:var(--acc);font-size:.82rem;font-family:var(--fmono);margin-bottom:12px">// INSTRUCTOR UPDATE</p>' +
        data.content + '</div>';
      if(ts) ts.textContent = 'Updated ' + new Date(data.updated_at).toLocaleDateString();
    }
    // If no data in Supabase — built-in notes already shown, nothing more to do
  }catch(e){ /* Supabase unavailable — built-in notes already displayed */ }
}

['m1','l5','Links, Navigation & Web Accessibility','WEB DEVELOPMENT › MOD 1 › L5',
`<p>Navigation is the backbone of UX. Accessibility is a <strong>legal requirement</strong> in the US, UK, and EU — and directly affects Google rankings through Core Web Vitals. Build accessible sites from the start; retrofitting costs 10x more.</p>
<pre><code>&lt;!-- Skip link — required for keyboard users --&gt;
&lt;a href="#main-content" class="skip-link"&gt;Skip to main content&lt;/a&gt;

&lt;header&gt;
  &lt;nav aria-label="Main navigation"&gt;
    &lt;ul role="list"&gt;
      &lt;li&gt;&lt;a href="/" aria-current="page"&gt;Home&lt;/a&gt;&lt;/li&gt;
      &lt;li&gt;&lt;a href="/services"&gt;Services&lt;/a&gt;&lt;/li&gt;
      &lt;li&gt;&lt;a href="/contact"&gt;Contact&lt;/a&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/nav&gt;
&lt;/header&gt;

&lt;!-- External links — always add security attributes --&gt;
&lt;a href="https://google.com"
   target="_blank"
   rel="noopener noreferrer"&gt;
  Open Google (opens in new tab)
&lt;/a&gt;</code></pre>
<table class="lt"><thead><tr><th>WCAG Rule</th><th>Requirement</th><th>Why It Matters</th></tr></thead><tbody>
<tr><td>Alt text</td><td>All images have descriptive alt=""</td><td>Screen readers + Google Images SEO</td></tr>
<tr><td>Color contrast</td><td>4.5:1 minimum ratio for body text</td><td>Legible for 300M+ colourblind users</td></tr>
<tr><td>Keyboard navigation</td><td>All functionality reachable by Tab key</td><td>Users without mouse depend on this</td></tr>
<tr><td>Focus indicators</td><td>Never remove :focus outlines</td><td>Keyboard users need to see focus position</td></tr>
</tbody></table>`,
`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>Why rel="noopener noreferrer" Matters</h4>
<p>Without <code>rel="noopener noreferrer"</code> on <code>target="_blank"</code> links, the opened page can access your page's window object via <code>window.opener</code>. This enables a phishing attack called "reverse tabnapping" where malicious sites redirect your original tab to a fake login page. Always add it to external links.</p>
<h4>ARIA Attributes You Must Know</h4>
<ul>
<li><strong>aria-label</strong> — provides a text description for elements without visible text (icon buttons)</li>
<li><strong>aria-current="page"</strong> — marks the active navigation link for screen readers</li>
<li><strong>aria-hidden="true"</strong> — hides decorative elements from screen readers</li>
<li><strong>aria-expanded</strong> — communicates open/closed state of dropdowns and accordions</li>
<li><strong>role="list"</strong> — some browsers strip list semantics from CSS-styled lists; this restores them</li>
</ul>
<h4>Keyboard Navigation Test</h4>
<p>Tab through your entire website using only the keyboard — no mouse. Can you reach every link, button, and form field? Can you submit every form? If you get stuck anywhere, that is a WCAG failure and a legal risk.</p>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> Test your site with just a keyboard. Tab through every element, fill every form, click every button. If you get stuck — that's an accessibility failure. Fix it before launch.</div>
</div>`,
[

['m2','l1','CSS Box Model & Custom Properties','WEB DEVELOPMENT › MOD 2 › L1',
`<p>Every element in CSS is a rectangular box. The box model defines exactly how space is calculated. One setting — <code>box-sizing: border-box</code> — is used by <strong>every professional stylesheet on earth</strong>.</p>
<pre><code>/* Professional CSS Reset — every project starts with this */
*, *::before, *::after {
  box-sizing: border-box; /* padding included in width — prevents overflow */
  margin: 0;
  padding: 0;
}
html { font-size: 16px; scroll-behavior: smooth; }
body { min-height: 100vh; line-height: 1.6; -webkit-font-smoothing: antialiased; }
img, video { max-width: 100%; height: auto; display: block; }

/* CSS Variables — the professional way */
:root {
  --clr-primary:   #2979ff;
  --clr-secondary: #00c3ff;
  --clr-dark:      #020818;
  --clr-text:      #c8daf5;
  --ff-heading:    'Bebas Neue', sans-serif;
  --ff-body:       'Outfit', sans-serif;
  --space-sm:  8px;   --space-md: 16px;
  --space-lg: 32px;   --space-xl: 64px;
  --radius:    8px;
  --shadow:    0 4px 24px rgba(41, 121, 255, 0.2);
}

.card {
  padding: var(--space-md);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  background: var(--clr-dark);
  color: var(--clr-text);
}</code></pre>`,
`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>The Box Model Visualised</h4>
<pre style="font-size:.8rem;color:var(--acc)">┌─────────────────────────────────┐
│            MARGIN               │ ← space outside
│  ┌───────────────────────────┐  │
│  │          BORDER           │  │ ← visible edge
│  │  ┌─────────────────────┐  │  │
│  │  │       PADDING       │  │  │ ← space inside
│  │  │  ┌───────────────┐  │  │  │
│  │  │  │    CONTENT    │  │  │  │
│  │  │  └───────────────┘  │  │  │
│  │  └─────────────────────┘  │  │
│  └───────────────────────────┘  │
└─────────────────────────────────┘</pre>
<h4>Why box-sizing: border-box Changes Everything</h4>
<p>By default (content-box), if you set <code>width: 300px; padding: 20px</code>, the element is actually 340px wide. With <code>border-box</code>, the element stays exactly 300px — the padding comes from inside. This eliminates an entire class of layout bugs.</p>
<h4>CSS Variables vs SASS Variables</h4>
<p>CSS Variables (custom properties) are live in the browser — they can be changed with JavaScript and they respond to media queries. SASS variables are compile-time only. Use CSS variables for design systems in 2025.</p>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> CSS Variables are used in every professional codebase. They allow you to change your entire design system by editing one file. Learn to use them from day one.</div>
</div>`,

['m2','l2','Flexbox — One-Dimensional Layouts','WEB DEVELOPMENT › MOD 2 › L2',
`<p>Flexbox replaced float-based layouts and is used on virtually every professional website. It arranges items in a row <strong>or</strong> column with precise alignment, spacing, and wrap control.</p>
<pre><code>.container {
  display: flex;
  flex-direction: row;          /* row | column | row-reverse | column-reverse */
  justify-content: flex-start;  /* main axis: center | space-between | space-evenly */
  align-items: stretch;         /* cross axis: center | flex-start | flex-end */
  flex-wrap: wrap;              /* wrap items to next line */
  gap: 24px;                    /* space between items */
}

.item {
  flex: 1 1 300px; /* grow | shrink | basis */
  align-self: center; /* override parent align-items */
}

/* The 4 patterns you'll use on every project */
/* 1. Perfect centre */
.center { display:flex; justify-content:center; align-items:center; min-height:100vh; }
/* 2. Nav bar: logo left, links right */
nav { display:flex; justify-content:space-between; align-items:center; }
/* 3. Responsive cards */
.cards { display:flex; flex-wrap:wrap; gap:24px; }
.card  { flex: 1 1 280px; max-width:400px; }
/* 4. Sticky footer */
body { display:flex; flex-direction:column; min-height:100vh; }
main { flex: 1; }</code></pre>`,
`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>The Two Axes of Flexbox</h4>
<ul>
<li><strong>Main axis:</strong> direction items flow (set by flex-direction). justify-content controls alignment on this axis</li>
<li><strong>Cross axis:</strong> perpendicular to main axis. align-items controls alignment on this axis</li>
</ul>
<p>If flex-direction is row (default): main axis is horizontal, cross axis is vertical. If flex-direction is column: they swap.</p>
<h4>flex: 1 1 280px Explained</h4>
<ul>
<li><strong>flex-grow: 1</strong> — item grows to fill available space</li>
<li><strong>flex-shrink: 1</strong> — item shrinks if container is too small</li>
<li><strong>flex-basis: 280px</strong> — starting size before grow/shrink is applied</li>
</ul>
<p>Together: "This item starts at 280px, can grow to fill space, and can shrink if needed." This creates responsive columns without media queries.</p>
<h4>gap vs margin</h4>
<p>Use <code>gap</code> instead of margin for spacing between flex items. Gap only applies between items (not outside the container), so you never get double-spacing on the edges.</p>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> Complete "Flexbox Froggy" at flexboxfroggy.com — 24 interactive puzzles that teach all Flexbox properties. Most developers complete it in 45 minutes and retain it for life.</div>
</div>`,

['m2','l3','CSS Grid — Two-Dimensional Layouts','WEB DEVELOPMENT › MOD 2 › L3',
`<p>CSS Grid controls rows <strong>AND</strong> columns simultaneously. It is used for full page layouts, dashboards, galleries, and any complex two-dimensional design.</p>
<pre><code>.grid {
  display: grid;
  /* Responsive columns — no media queries needed */
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px;
}

/* Named template areas — most readable layout technique */
.page-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  grid-template-rows: 70px 1fr 60px;
  grid-template-areas:
    "header  header"
    "sidebar main"
    "footer  footer";
  min-height: 100vh;
}
header { grid-area: header; }
aside  { grid-area: sidebar; }
main   { grid-area: main; }
footer { grid-area: footer; }

/* Span items across multiple cells */
.hero       { grid-column: 1 / -1; }   /* full width */
.wide-card  { grid-column: span 2; }   /* span 2 cols */</code></pre>`,
`<div class="note-section">

<h4>The repeat(auto-fit, minmax()) Pattern</h4>
<p>This is the most powerful responsive CSS technique:</p>
<ul>
<li><strong>auto-fit</strong> — creates as many columns as will fit in the container</li>

['m2','l4','Responsive Design & Mobile-First CSS','WEB DEVELOPMENT › MOD 2 › L4',
`<p>Over <strong>60% of global web traffic is mobile</strong>. Google uses mobile-first indexing — it ranks your mobile version, not desktop. Responsive design is not a bonus feature; it is a baseline requirement for every professional website.</p>
<pre><code>/* MOBILE FIRST — write mobile styles first, scale up */

/* Base: mobile (320px+) */
.container { padding: 16px; }
.grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
.nav-links { display: none; }

/* Tablet (768px+) */
@media (min-width: 768px) {
  .container { padding: 24px; }
  .grid { grid-template-columns: repeat(2, 1fr); }
}

/* Desktop (1024px+) */
@media (min-width: 1024px) {
  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
  .grid { grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .nav-links { display: flex; }
}

/* Fluid typography — no breakpoints needed */
h1 { font-size: clamp(1.75rem, 5vw, 3.5rem); }
p  { font-size: clamp(0.9rem, 2vw, 1.1rem); }</code></pre>`,
`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>Mobile-First vs Desktop-First</h4>
<p><strong>Mobile-first</strong> (recommended): Write mobile styles as the default, then use <code>min-width</code> media queries to enhance for larger screens. This produces smaller, faster CSS because mobile devices download only the base styles.</p>
<p><strong>Desktop-first</strong> (outdated): Write desktop styles, then use <code>max-width</code> queries to shrink for mobile. This produces heavier CSS on mobile — the opposite of what you want.</p>
<h4>Standard Breakpoints (2025)</h4>
<table class="lt"><thead><tr><th>Breakpoint</th><th>Width</th><th>Target</th></tr></thead><tbody>
<tr><td>Mobile</td><td>&lt; 768px</td><td>Phones (60%+ of traffic)</td></tr>
<tr><td>Tablet</td><td>768px – 1023px</td><td>Tablets, large phones</td></tr>
<tr><td>Desktop</td><td>1024px – 1439px</td><td>Laptops, desktops</td></tr>
<tr><td>Wide</td><td>1440px+</td><td>Large monitors</td></tr>
</tbody></table>
<h4>clamp() — The Most Powerful Responsive Tool</h4>
<p><code>clamp(min, preferred, max)</code> — the font size scales fluidly between min and max based on viewport width. This eliminates dozens of media queries just for typography.</p>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> Always test in Chrome DevTools (F12 → Toggle device toolbar) at 320px, 375px, 768px, and 1440px. Also test on a real phone — DevTools is not 100% accurate, especially for iOS Safari.</div>
</div>`,

<tr><td>let</td><td>Yes</td><td>Yes</td><td>Counters, loop variables, state</td></tr>
<tr><td>var</td><td>Yes</td><td>No (function-scoped)</td><td>Never — causes bugs due to hoisting</td></tr>
</tbody></table>
<h4>const with Objects — Common Confusion</h4>
<p>const does not mean immutable. It means the variable reference cannot be reassigned. Object properties CAN still change:</p>
<pre style="font-size:.83rem;color:var(--acc)">const user = { name: 'Felix' };
user.name = 'Mike';   // ✅ allowed — changing a property
user = {};            // ❌ TypeError — reassigning the variable</pre>
<h4>Why Arrow Functions Are Preferred</h4>
<ul>
<li>Shorter syntax</li>
<li>No own <code>this</code> binding — ideal for callbacks</li>
<li>Cannot be used as constructors — forces proper patterns</li>
<li>Standard in all modern codebases (React, Vue, Node.js)</li>
</ul>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> Arrow functions do not have their own "this" — making them perfect for callbacks and class methods. Understanding this is a common technical interview question for JavaScript roles.</div>
</div>`,

['m3','l2','DOM Manipulation — Control the Page','WEB DEVELOPMENT › MOD 3 › L2',
`<p>The DOM (Document Object Model) is the browser's tree representation of your HTML. JavaScript reads and modifies it in real time — without reloading the page. This is the foundation of every interactive web application.</p>
<pre><code>// SELECTING
const title   = document.getElementById('hero-title');
const btn     = document.querySelector('.btn-primary');       // first match
const allBtns = document.querySelectorAll('.btn');            // NodeList

// READING & WRITING
title.textContent = 'New Title';                              // safe: text only
title.innerHTML   = '&lt;strong&gt;Bold&lt;/strong&gt;';                 // HTML (risky!)

// ATTRIBUTES & DATA
btn.setAttribute('aria-expanded', 'true');
btn.removeAttribute('disabled');
btn.dataset.userId = '42';                                    // data-user-id="42"

// CLASSES
title.classList.add('active');
title.classList.remove('hidden');
title.classList.toggle('open');
title.classList.replace('loading', 'loaded');

// CREATE & INSERT
const card = document.createElement('div');
card.className = 'card';
card.innerHTML = \`&lt;h2&gt;\${title}&lt;/h2&gt;&lt;p&gt;\${body}&lt;/p&gt;\`;
document.querySelector('.grid').append(card);

// REMOVE
card.remove();</code></pre>`,
`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>textContent vs innerHTML — Security Critical</h4>
<table class="lt"><thead><tr><th>Method</th><th>Use</th><th>Risk</th></tr></thead><tbody>
<tr><td>textContent</td><td>Any user-provided content</td><td>Safe — renders as plain text</td></tr>
<tr><td>innerHTML</td><td>Trusted HTML you write</td><td>XSS risk with user data</td></tr>
<tr><td>innerText</td><td>Visible text only</td><td>Safe but slow (triggers reflow)</td></tr>
</tbody></table>
<h4>XSS Attack Example</h4>
<p>If a user types <code>&lt;script&gt;document.cookie&lt;/script&gt;</code> and you insert it via innerHTML, the browser executes it. The attacker can steal cookies, session tokens, and redirect users to phishing sites. Always use textContent for user input.</p>
<h4>querySelector vs getElementById</h4>
<p><code>querySelector</code> accepts any CSS selector and is more flexible. <code>getElementById</code> is marginally faster for ID lookups but only accepts an ID string. Use querySelector for everything except performance-critical loops.</p>
<h4>classList vs style</h4>
<p>Prefer classList over direct style manipulation. Toggling classes keeps your CSS in one place (the stylesheet) instead of scattered through JavaScript, making maintenance much easier.</p>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> NEVER use innerHTML with user-provided data. It creates XSS (Cross-Site Scripting) vulnerabilities — attackers can inject and execute malicious scripts. Always use textContent for user data.</div>
</div>`,

['m3','l3','Events, Fetch API & Async JavaScript','WEB DEVELOPMENT › MOD 3 › L3',
`<p>Events make pages interactive. Fetch loads data without page reloads. Async/await is the modern way to handle asynchronous operations. Together, they power every modern web application.</p>
<pre><code>// EVENT HANDLING — never use onclick="" attributes in HTML
document.querySelector('#btn').addEventListener('click', (event) => {
  event.preventDefault();    // stops default behaviour
  event.stopPropagation();   // stops bubbling to parent
  console.log(event.target); // element that was clicked
});

// Event delegation — one listener for many children
document.querySelector('.list').addEventListener('click', (e) => {
  const item = e.target.closest('.item');
  if (item) openItem(item.dataset.id);
});

// FETCH — standard async GET
async function getUsers() {
  try {
    const res = await fetch('https://api.example.com/users');
    if (!res.ok) throw new Error(\`HTTP \${res.status}\`);
    return await res.json();
  } catch (err) {
    console.error('Fetch error:', err.message);
  }
}

// POST — sending data
async function createUser(data) {
  const res = await fetch('/api/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return res.json();
}

// Run multiple requests simultaneously
const [users, posts] = await Promise.all([getUsers(), getPosts()]);</code></pre>`,
`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>Event Bubbling & Delegation</h4>
<p>When you click a button inside a div, the click event fires on the button, then "bubbles up" to the div, then body, then document. <strong>Event delegation</strong> exploits this: attach one listener to a parent and handle all children's events there. This is more efficient and works for dynamically created elements.</p>
<h4>Why async/await over Promises .then()</h4>
<p>Both work, but async/await reads like synchronous code — easier to understand, easier to debug, and error handling with try/catch is more intuitive than .catch() chaining.</p>
<pre style="font-size:.82rem;color:var(--acc)">// Promises .then() — harder to read
fetch(url).then(r => r.json()).then(data => use(data)).catch(err => handle(err));

// async/await — reads naturally
try {
  const data = await fetch(url).then(r => r.json());
  use(data);
} catch(err) { handle(err); }</pre>
<h4>HTTP Status Codes You Must Know</h4>
<table class="lt"><thead><tr><th>Code</th><th>Meaning</th></tr></thead><tbody>
<tr><td>200 OK</td><td>Request successful</td></tr>
<tr><td>201 Created</td><td>Resource created (POST success)</td></tr>
<tr><td>400 Bad Request</td><td>Invalid data sent by client</td></tr>
<tr><td>401 Unauthorized</td><td>Not authenticated</td></tr>
<tr><td>403 Forbidden</td><td>Authenticated but no permission</td></tr>
<tr><td>404 Not Found</td><td>Resource doesn't exist</td></tr>
<tr><td>500 Server Error</td><td>Something broke on the server</td></tr>
</tbody></table>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> Always wrap async code in try/catch. Unhandled Promise rejections crash Node.js applications and create silent failures in browsers. Every await needs error handling in production code.</div>
</div>`,

`<div class="note-section">

<h4>E-E-A-T — What Google Is Actually Evaluating</h4>
<p>Google introduced E-E-A-T (Experience, Expertise, Authoritativeness, Trustworthiness) as its quality evaluator guideline framework. For every page Google indexes, it asks:</p>

<li><strong>Experience:</strong> Has the author personally experienced what they're writing about?</li>

<p>Google doesn't crawl every page of every site every day. Larger sites have a "crawl budget." Wasting it on duplicate pages, redirect chains, and low-value URLs means new important content gets discovered more slowly. This is why clean site architecture matters.</p>

['m1','l2','Domains, DNS & Professional Management','HOSTING & MAINTENANCE › MOD 1 › L2',
`<p>A domain name is a business's most valuable digital asset. Understanding DNS professionally allows you to manage client sites with complete confidence and resolve issues without calling support.</p>
<table class="lt"><thead><tr><th>Record</th><th>Purpose</th><th>Example</th></tr></thead><tbody>
<tr><td>A Record</td><td>Points domain to IPv4 server</td><td>fmm.co.ke → 41.222.100.50</td></tr>
<tr><td>AAAA Record</td><td>Points domain to IPv6 server</td><td>fmm.co.ke → 2001:db8::1</td></tr>
<tr><td>CNAME</td><td>Alias one subdomain to another</td><td>www → fmm.co.ke</td></tr>
<tr><td>MX Record</td><td>Directs email to mail servers</td><td>Priority 1: aspmx.l.google.com</td></tr>
<tr><td>TXT Record</td><td>Email authentication + verification</td><td>v=spf1 include:_spf.google.com ~all</td></tr>
<tr><td>NS Record</td><td>Defines authoritative nameservers</td><td>ns1.cloudflare.com</td></tr>
</tbody></table>
<pre><code>Professional domain management rules:
✅ Register in client's name, using their payment method
✅ Enable auto-renewal immediately after registration
✅ Enable domain lock (prevents unauthorised transfer)
✅ Move DNS to Cloudflare (fastest, most features, free)
✅ Set TTL to 300s (5 mins) before migrating hosting
✅ For .co.ke: use KENIC-accredited registrar</code></pre>`,
`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>How DNS Resolution Works</h4>
<ol>
<li>User types "fmm.co.ke" in browser</li>
<li>Browser asks DNS resolver (8.8.8.8 Google or 1.1.1.1 Cloudflare): "What's the IP?"</li>
<li>If not cached → resolver asks Root nameservers</li>
<li>Root says "ask the .ke nameserver"</li>
<li>.ke nameserver says "ask fmm.co.ke's nameservers" (set at registrar)</li>
<li>Your nameserver returns the A record: IP address</li>
<li>Browser connects to that IP and loads the site</li>
<li>Total time: under 50 milliseconds</li>
</ol>
<h4>DNS TTL — Time to Live</h4>
<p>TTL controls how long DNS resolvers cache your records. Default is 3600 seconds (1 hour) or sometimes 86400 (24 hours). Before migrating a site to new hosting, reduce TTL to 300 seconds (5 minutes) at least 24 hours in advance. This ensures your DNS change propagates globally in 5 minutes instead of 24 hours.</p>
<h4>Why You Must Never Register Domains in Your Own Name for Clients</h4>
<p>The domain is the client's business asset — their brand, their email, their traffic. If your client relationship ends and the domain is registered in your name, you hold their business hostage. Always register in their name, or transfer ownership immediately if you registered it for them.</p>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> A client's expired domain is catastrophic — competitors can register it, it loses all SEO authority, and email stops immediately. Set calendar reminders 90, 30, and 7 days before every client domain renewal date.</div>
</div>`,

`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>Debugging the 500 Internal Server Error</h4>
<p>The most common WordPress error. Follow this sequence:</p>
<ol>
<li><strong>Check Error Logs</strong> in cPanel → Metrics → Errors. Read the actual PHP error message</li>
<li><strong>Test .htaccess</strong> — rename to .htaccess_backup. If site loads, .htaccess was corrupt (common after WordPress updates). Regenerate via Settings → Permalinks → Save</li>
<li><strong>Check permissions</strong> — directories should be 755, files 644</li>
<li><strong>Increase PHP memory</strong> — add to wp-config.php: define('WP_MEMORY_LIMIT', '256M')</li>
<li><strong>Deactivate all plugins</strong> — rename /wp-content/plugins/ to /plugins-disabled/ via FTP to test</li>
</ol>
<h4>Understanding File Permissions</h4>
<p>chmod 755 = rwxr-xr-x: Owner can read/write/execute; everyone else can read/execute. Perfect for directories that need to be traversable.</p>
<p>chmod 644 = rw-r--r--: Owner can read/write; everyone else can only read. Correct for PHP/HTML files.</p>
<p>chmod 777 = everyone can do everything. NEVER use on a live server — a major security vulnerability.</p>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> Always check cPanel Error Logs BEFORE contacting support. Reading the actual error message solves 80% of issues faster than waiting for support. Hosting support looks at the same logs — you can do it yourself first.</div>

['m2','l1','SSL Certificates — HTTPS Configuration','HOSTING & MAINTENANCE › MOD 2 › L1',
`<p>HTTPS is mandatory in 2025. Google marks HTTP as "Not Secure". SSL is a direct ranking factor. It protects user data and builds trust — every visitor expects it.</p>
<table class="lt"><thead><tr><th>Type</th><th>Validates</th><th>Cost</th><th>Best For</th></tr></thead><tbody>
<tr><td>DV (Domain Validated)</td><td>Domain ownership</td><td>Free (Let's Encrypt)</td><td>WordPress sites, portfolios, blogs</td></tr>
<tr><td>OV (Organisation Validated)</td><td>Domain + company details</td><td>$50-300/year</td><td>Business websites</td></tr>
<tr><td>EV (Extended Validation)</td><td>Full legal verification</td><td>$100-500/year</td><td>Banks, healthcare, enterprise</td></tr>
<tr><td>Wildcard SSL</td><td>Domain + all subdomains</td><td>$100-400/year</td><td>Sites with many subdomains</td></tr>
</tbody></table>
<pre><code># Force HTTPS via .htaccess
RewriteEngine On
RewriteCond %{HTTPS} off
RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

# After installing SSL in WordPress:
# Settings > General > update both URLs to https://

# Fix mixed content (http:// on https:// page):
# Use Really Simple SSL plugin (handles everything)
# Or: Search & Replace → replace http://yoursite.com → https://

# Verify at: ssllabs.com/ssltest → target A or A+ rating</code></pre>`,
`<div class="note-section">
<h3>📖 From Your Course Notes</h3>
<h4>How SSL/TLS Actually Works</h4>
<ol>
<li>Browser requests your site</li>
<li>Server sends its SSL certificate (contains public key)</li>
<li>Browser verifies certificate is valid and trusted</li>
<li>Browser generates a session key, encrypts it with server's public key</li>
<li>Server decrypts with private key — only server can do this</li>
<li>Both parties now use the shared session key for encryption</li>
<li>All data transmitted is encrypted — HTTPS padlock shows</li>
</ol>
<h4>Mixed Content — The Silent HTTPS Breaker</h4>
<p>Mixed content occurs when an HTTPS page loads resources (images, scripts, stylesheets) over HTTP. The browser blocks or warns about this, showing a broken padlock. Causes: old content with hardcoded http:// URLs in the database. Fix: Really Simple SSL plugin, or Search & Replace in database.</p>
<h4>Let's Encrypt vs Paid SSL</h4>
<p>For 95% of sites, free Let's Encrypt DV certificates are identical to paid DV certificates in terms of encryption strength. The only reasons to buy an OV or EV certificate are: you need the organisation name displayed, or you work in finance/healthcare where EV is required by regulation. Save your clients' money — use Let's Encrypt.</p>
<div class="note-tip">💡 <strong>Pro Tip from Notes:</strong> After installing SSL, use Really Simple SSL plugin in WordPress to automatically handle HTTP-to-HTTPS redirects and fix mixed content issues. It handles edge cases you would miss manually.</div>
</div>`,

{q:'What causes "mixed content" on an HTTPS site?',opts:['Using too many SSL certificates','Images or scripts loaded over HTTP on an otherwise HTTPS page — browser blocks them','Having both www and non-www versions of the site','Using a self-signed certificate'],ans:1},
{q:'For a standard WordPress blog or portfolio site, which SSL certificate type is appropriate?',opts:['EV (Extended Validation)','OV (Organisation Validated)','DV (Domain Validated) via free Let\'s Encrypt','Wildcard SSL'],ans:2},

  if (idx < 0 || idx >= cur.length) return;
  CI = idx;
  const [mod, lid, title, bc, body, notes, quiz] = cur[idx];

  document.getElementById('lh1').textContent = title;
  document.getElementById('lbread').textContent = bc;
  document.getElementById('lprose').innerHTML = body;

  // Load lesson notes (built-in + optional Supabase override)
  loadNotes(CC + '-' + mod + '-' + lid, notes);

  // Sidebar
  document.querySelectorAll('.lr').forEach(r => r.classList.remove('on'));
  const row = document.querySelector(`.lr[data-mod="${mod}"][data-lid="${lid}"]`);
  if (row) {
    row.classList.add('on');
    const mg = row.closest('.mg');
    if (mg) {
      document.querySelectorAll('.ml').forEach(l => l.classList.remove('op'));
      document.querySelectorAll('.mt').forEach(t => t.classList.remove('op'));
      mg.querySelector('.mt')?.classList.add('op');
      mg.querySelector('.ml')?.classList.add('op');
    }
  }

  // Nav buttons
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  prev.style.display = idx === 0 ? 'none' : 'inline-flex';
  next.style.display = 'none';

  // Only reveal Next button if this lesson is already marked complete
  if (isLessonDone(CC, mod, lid) && idx < cur.length - 1) {
    next.style.display = 'inline-flex';
    next.innerHTML = 'Next Lesson <span class="ar">→</span>';
  }

  // Lesson-specific quiz
  initQuiz(quiz, 'qbox');
  updateLsbPct(CC);
  window.scrollTo({ top: 70, behavior: 'smooth' });
}

function goNext() {
  const cur = getCur();
  if (CI >= cur.length - 1) return;
  const [mod, lid] = cur[CI];
  if (!isLessonDone(CC, mod, lid)) {
    showLockToast();
    return;
  }
  renderLesson(CI + 1);
}
function goPrev() { if (CI > 0) renderLesson(CI - 1); }

function fmmComplete() {
  const cur = getCur();
  const [mod, lid] = cur[CI];
  const v = markDone(CC, mod, lid);

  const next = document.getElementById('btn-next');
  if (CI < cur.length - 1) {
    next.style.display = 'inline-flex';
    next.innerHTML = 'Next Lesson <span class="ar">→</span>';
  }

  const row = document.querySelector(`.lr[data-mod="${mod}"][data-lid="${lid}"]`);
  if (row) { row.classList.add('dn'); const dot = row.querySelector('.ld'); if (dot) dot.textContent = '✓'; }

  updateLsbPct(CC);
  renderProgress();

  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;bottom:32px;right:32px;background:linear-gradient(135deg,#1557e8,#2979ff);color:#fff;padding:14px 26px;border-radius:100px;font-weight:700;font-family:"JetBrains Mono",monospace;font-size:.84rem;box-shadow:0 8px 32px rgba(41,121,255,.5);z-index:9999';
  toast.textContent = `✅ Lesson complete! Progress: ${v}%`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2800);
  setTimeout(() => { if (CI < cur.length - 1) goNext(); }, 1600);
}

function loadLesson(mod, lid) {
  const cur = getCur();
  const idx = cur.findIndex(l => l[0] === mod && l[1] === lid);
  if (idx === -1) return;
  // Lesson 0 always unlocked; others require the previous lesson to be done
  if (idx > 0) {
    const [prevMod, prevLid] = cur[idx - 1];
    if (!isLessonDone(CC, prevMod, prevLid)) {
      showLockToast();
      return;
    }
  }
  renderLesson(idx);
}

// ════════════════════════════════════════════════════════════════════
// SIDEBAR — dynamic from curriculum
// ════════════════════════════════════════════════════════════════════
const COURSE_MOD_NAMES = {
  'web-dev':   { m1:'HTML Fundamentals', m2:'CSS Mastery', m3:'JavaScript Essentials' },
  'wordpress': { m1:'WordPress Foundations', m2:'Advanced WordPress' },
  'seo':       { m1:'SEO Foundations', m2:'Advanced SEO' },
  'hosting':   { m1:'Hosting Fundamentals', m2:'Maintenance & Security' },
  'ecommerce': { m1:'Store Setup & Strategy', m2:'Growth & Optimisation' },
};

function buildSidebar() {
  const cur = getCur();
  const container = document.getElementById('sidebar-modules');
  if (!container) return;

  const modules = {};
  cur.forEach(([mod, lid, title]) => {
    if (!modules[mod]) modules[mod] = [];
    modules[mod].push({ mod, lid, title });
  });

  const cmod = COURSE_MOD_NAMES[CC] || {};

  container.innerHTML = Object.entries(modules).map(([modId, lessons], i) => `
    <div class="mg">
      <div class="mt ${i===0?'op':''}"><span>${modId.toUpperCase()}: ${cmod[modId]||modId}</span><span class="mta">›</span></div>
      <div class="ml ${i===0?'op':''}">
        ${lessons.map((l,j) => {
          const globalIdx = cur.findIndex(x => x[0]===l.mod && x[1]===l.lid);
          const unlocked  = globalIdx === 0 || (() => {
            const [pm,pl] = cur[globalIdx-1];
            return isLessonDone(CC, pm, pl);
          })();
          const done = isLessonDone(CC, l.mod, l.lid);
          return `<div class="lr ${i===0&&j===0?'on':''} ${!unlocked?'lr-locked':''}" data-mod="${l.mod}" data-lid="${l.lid}" onclick="loadLesson('${l.mod}','${l.lid}')">
            <span class="ld">${done?'✓':(!unlocked?'🔒':'')}</span>${l.title}
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');

  document.querySelectorAll('.mt').forEach(toggle => {
    toggle.addEventListener('click', () => {
      const list = toggle.nextElementSibling;
      const open = list.classList.contains('op');
      document.querySelectorAll('.ml').forEach(l => l.classList.remove('op'));
      document.querySelectorAll('.mt').forEach(t => t.classList.remove('op'));
      if (!open) { list.classList.add('op'); toggle.classList.add('op'); }
    });
  });
}

document.addEventListener('DOMContentLoaded', async () => {

// MONETISATION — PAYWALL SYSTEM
// ════════════════════════════════════════════════════════════════

// Course tiers and pricing
const COURSE_TIERS = {
  'web-dev':   { tier: 'advanced',     price: 10000, label: 'Advanced' },
  'wordpress': { tier: 'intermediate', price: 5000,  label: 'Intermediate' },
  'seo':       { tier: 'intermediate', price: 5000,  label: 'Intermediate' },
  'hosting':   { tier: 'beginner',     price: 3000,  label: 'Beginner' },
  'ecommerce': { tier: 'advanced',     price: 10000, label: 'Advanced' },
};

const PAYWALL_LESSON = 0.5; // trigger at 50% completion
let courseAccess = {};      // { 'web-dev': true/false, ... }
let paySettings  = {};      // { mpesa_number, mpesa_name, bank_name, bank_account, bank_branch, contact_email }

// Called once on init — checks Supabase for this user's access
async function checkCourseAccess() {
  if (!sb) return;
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;

    // Get access grants for this user
    const { data } = await sb.from('course_access')
      .select('course_id, granted')
      .eq('user_id', user.id);

    (data || []).forEach(row => {
      if (row.granted) courseAccess[row.course_id] = true;
    });

    // Get payment settings from instructor settings table
    const { data: settings } = await sb.from('payment_settings')
      .select('*').eq('id', 1).single();
    if (settings) paySettings = settings;

  } catch(e) { /* Supabase unavailable — allow all (graceful degradation) */ }
}

// Check if current student has access to continue past 50%
function hasAccess(courseId) {
  return !!courseAccess[courseId];
}

// How far into the course is the student (0-1)
function getCourseRatio(courseId) {
  const p = getP();
  const done = Object.values(p[courseId] || {}).flat().length;
  const total = TOTALS[courseId] || 1;
  return done / total;
}

// Should this lesson be paywalled?
function isPaywalled(courseId, lessonIdx) {
  const cur = getCur();
  const paywallIdx = Math.floor(cur.length * PAYWALL_LESSON); // lesson index at 50%
  return lessonIdx >= paywallIdx && !hasAccess(courseId);
}

// Show paywall overlay
async function showPaywall(courseId) {
  // Remove existing
  document.querySelector('.paywall-overlay')?.remove();

  const tier  = COURSE_TIERS[courseId];
  const names = {
    'web-dev':'Website Development','wordpress':'WordPress Design',
    'seo':'SEO Mastery','hosting':'Hosting & Maintenance','ecommerce':'E-Commerce Mastery'
  };

  // Get payment details (from settings or defaults)
  const mpesa    = paySettings.mpesa_number  || 'Contact instructor';
  const mpName   = paySettings.mpesa_name    || 'FMM Academy';
  const bankName = paySettings.bank_name     || '';
  const bankAcc  = paySettings.bank_account  || '';
  const bankBr   = paySettings.bank_branch   || '';
  const email    = paySettings.contact_email || '';

  const bankHtml = bankAcc ? `
    <div class="pay-detail" onclick="copyText('${bankAcc}', this)">
      <strong>BANK ACCOUNT</strong>
      ${bankName} — ${bankAcc}<br>
      <small style="color:#7a9cc8">${bankBr}</small>
      <div class="copy-hint">Click to copy account number</div>
    </div>` : '';

  const ov = document.createElement('div');
  ov.className = 'paywall-overlay';
  ov.id = 'paywall-overlay';
  ov.innerHTML = `
    <div class="paywall-card">
      <div class="paywall-lock">🔐</div>
      <h2>UNLOCK FULL COURSE</h2>
      <p>You've completed the free preview of <strong style="color:#fff">${names[courseId]}</strong>. 
         Purchase access to continue to all remaining lessons.</p>
      <div class="paywall-price">
        <div class="amount">KES ${tier.price.toLocaleString()}</div>
        <div class="level">${tier.label} Course — Full Access</div>
      </div>
      <ul class="paywall-features">
        <li>✅ All remaining lessons unlocked immediately</li>
        <li>✅ All quizzes and completion certificates</li>
        <li>✅ Downloadable course notes PDF</li>
        <li>✅ Lifetime access — study at your own pace</li>
      </ul>
      <div class="paywall-instructions">
        <h4>💳 How to Pay</h4>
        <div class="pay-step">
          <span class="step-num">1</span>
          <span>Send <strong>KES ${tier.price.toLocaleString()}</strong> via M-Pesa to:</span>
        </div>
        <div class="pay-detail" onclick="copyText('${mpesa}', this)">
          <strong>M-PESA NUMBER</strong>
          ${mpesa} — ${mpName}
          <div class="copy-hint">Click to copy number</div>
        </div>
        ${bankHtml}
        <div class="pay-step" style="margin-top:10px">
          <span class="step-num">2</span>
          <span>Send your M-Pesa confirmation code + email to your instructor to get access activated.</span>
        </div>
        ${email ? `<div class="paywall-contact">📧 ${email}</div>` : ''}
      </div>
      <div class="paywall-contact">
        Once payment is confirmed your instructor will grant access — usually within a few hours.
      </div>
    </div>`;
  document.body.appendChild(ov);
}

function copyText(text, el) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = el.querySelector('.copy-hint');
    if (orig) { orig.textContent = '✅ Copied!'; setTimeout(() => orig.textContent = 'Click to copy', 2000); }
  });
}

// Intercept renderLesson — check paywall before rendering
const _origRenderLesson = renderLesson;
function renderLesson(idx) {
  if (isPaywalled(CC, idx)) {
    // Still update sidebar highlight and scroll position
    const cur = getCur();
    const [mod, lid] = cur[idx];
    document.querySelectorAll('.lr').forEach(r => r.classList.remove('on'));
    const row = document.querySelector(`.lr[data-mod="${mod}"][data-lid="${lid}"]`);
    if (row) row.classList.add('on');
    showPaywall(CC);
    return;
  }
  // Close paywall if open
  document.querySelector('.paywall-overlay')?.remove();
  _origRenderLesson(idx);
}

// Intercept loadLesson too
const _origLoadLesson = loadLesson;
function loadLesson(mod, lid) {
  const cur = getCur();
  const idx = cur.findIndex(l => l[0] === mod && l[1] === lid);
  if (idx !== -1 && isPaywalled(CC, idx)) {
    showPaywall(CC); return;
  }
  _origLoadLesson(mod, lid);
}

// Patch sidebar to show lock icon on paywalled lessons
const _origBuildSidebar = buildSidebar;
function buildSidebar() {
  _origBuildSidebar();
  const cur = getCur();
  cur.forEach((lesson, idx) => {
    if (isPaywalled(CC, idx)) {
      const [mod, lid] = lesson;
      const row = document.querySelector(`.lr[data-mod="${mod}"][data-lid="${lid}"]`);
      if (row) {
        row.classList.add('lr-locked');
        const dot = row.querySelector('.ld');
        if (dot && dot.textContent !== '✓') dot.textContent = '💰';
      }
    }
  });
}
