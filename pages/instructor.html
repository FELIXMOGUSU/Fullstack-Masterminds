<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instructor Dashboard — FMM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#020818;--bg1:#060e24;--bg2:#0b1535;--bg3:#0f1c42;
  --blue:#2979ff;--blueu:#00c3ff;--glow:rgba(41,121,255,.25);
  --txt:#c8daf5;--txtm:#7a9cc8;--txtd:#3a5a8a;
  --ok:#00e676;--warn:#ffab40;--danger:#ff5252;
  --fhead:'Bebas Neue',sans-serif;
  --fbody:'Outfit',sans-serif;
  --fmono:'JetBrains Mono',monospace;
  --r:10px;
}
html{font-size:16px;background:var(--bg0);color:var(--txt);font-family:var(--fbody)}
body{min-height:100vh;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(2,8,24,.92);
  border-bottom:1px solid rgba(41,121,255,.15);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:64px;
}
.logo{font-family:var(--fhead);font-size:1.5rem;color:#fff;letter-spacing:.08em}
.logo span{color:var(--blue)}
.badge{
  background:rgba(41,121,255,.15);border:1px solid rgba(41,121,255,.3);
  color:var(--blue);font-family:var(--fmono);font-size:.72rem;
  padding:4px 12px;border-radius:100px;letter-spacing:.05em;
}
.topbar-right{display:flex;align-items:center;gap:16px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--fbody);font-size:.88rem;font-weight:600;
  padding:8px 20px;border-radius:8px;border:none;cursor:pointer;
  transition:all .2s ease;text-decoration:none;
}
.btn-ghost{background:transparent;border:1px solid rgba(41,121,255,.3);color:var(--txtm)}
.btn-ghost:hover{border-color:var(--blue);color:var(--txt)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1565c0;transform:translateY(-1px)}

/* ── MAIN LAYOUT ── */
main{flex:1;padding:40px 32px;max-width:1400px;width:100%;margin:0 auto}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:40px}
.page-header h1{font-family:var(--fhead);font-size:2.8rem;letter-spacing:.06em;color:#fff;line-height:1}
.page-header p{color:var(--txtm);margin-top:8px;font-size:.95rem}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px}
.stat-card{
  background:var(--bg1);border:1px solid rgba(41,121,255,.12);
  border-radius:var(--r);padding:24px;
  transition:border-color .2s;
}
.stat-card:hover{border-color:rgba(41,121,255,.3)}
.stat-val{font-family:var(--fhead);font-size:2.6rem;color:#fff;letter-spacing:.04em;line-height:1}
.stat-val span{font-size:1.4rem;color:var(--blue)}
.stat-label{font-size:.82rem;color:var(--txtm);margin-top:6px;font-family:var(--fmono);letter-spacing:.03em}
.stat-delta{font-size:.78rem;color:var(--ok);margin-top:4px}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  margin-bottom:24px;
}
.search-wrap{
  position:relative;flex:1;min-width:200px;max-width:340px;
}
.search-wrap input{
  width:100%;background:var(--bg1);border:1px solid rgba(41,121,255,.2);
  border-radius:8px;padding:9px 16px 9px 38px;
  color:var(--txt);font-family:var(--fbody);font-size:.88rem;
}
.search-wrap input:focus{outline:none;border-color:var(--blue)}
.search-wrap input::placeholder{color:var(--txtd)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txtd);font-size:.9rem}
.filter-sel{
  background:var(--bg1);border:1px solid rgba(41,121,255,.2);
  color:var(--txt);font-family:var(--fbody);font-size:.85rem;
  padding:9px 14px;border-radius:8px;cursor:pointer;
}
.filter-sel:focus{outline:none;border-color:var(--blue)}
.sort-btn{
  background:var(--bg2);border:1px solid rgba(41,121,255,.15);
  color:var(--txtm);padding:9px 14px;border-radius:8px;
  font-family:var(--fmono);font-size:.78rem;cursor:pointer;
  transition:all .2s;
}
.sort-btn:hover,.sort-btn.active{border-color:var(--blue);color:var(--blue)}
.ml-auto{margin-left:auto}
.export-btn{
  background:rgba(0,195,255,.08);border:1px solid rgba(0,195,255,.25);
  color:var(--blueu);font-size:.82rem;padding:8px 16px;
  border-radius:8px;cursor:pointer;font-family:var(--fmono);
  transition:all .2s;display:flex;align-items:center;gap:6px;
}
.export-btn:hover{background:rgba(0,195,255,.15)}

/* ── TABLE ── */
.table-wrap{
  background:var(--bg1);border:1px solid rgba(41,121,255,.12);
  border-radius:var(--r);overflow:hidden;
}
.table-wrap table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg2);border-bottom:1px solid rgba(41,121,255,.15)}
thead th{
  padding:14px 16px;text-align:left;
  font-family:var(--fmono);font-size:.72rem;color:var(--txtm);
  letter-spacing:.08em;text-transform:uppercase;font-weight:400;
  white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--txt)}
thead th.sort-asc::after{content:' ↑'}
thead th.sort-desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid rgba(41,121,255,.07);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(41,121,255,.05)}
tbody td{padding:14px 16px;font-size:.875rem;color:var(--txt)}

/* student cell */
.student-cell{display:flex;align-items:center;gap:12px}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--blueu));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fhead);font-size:1rem;color:#fff;flex-shrink:0;
}
.student-name{font-weight:600;color:#fff}
.student-email{font-size:.78rem;color:var(--txtm);margin-top:2px}

/* progress bars */
.prog-cell{min-width:180px}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.prog-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:100px;transition:width .4s ease}
.prog-pct{font-family:var(--fmono);font-size:.75rem;color:var(--txtm);min-width:32px;text-align:right}
.course-label{font-size:.7rem;color:var(--txtd);font-family:var(--fmono)}

/* status badge */
.status{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:.75rem;
  font-family:var(--fmono);font-weight:700;
}
.status-active{background:rgba(0,230,118,.1);color:var(--ok);border:1px solid rgba(0,230,118,.25)}
.status-idle{background:rgba(255,171,64,.1);color:var(--warn);border:1px solid rgba(255,171,64,.25)}
.status-new{background:rgba(41,121,255,.1);color:var(--blue);border:1px solid rgba(41,121,255,.25)}

/* overall bar */
.overall-bar{
  display:flex;align-items:center;gap:10px;
}
.overall-track{
  flex:1;height:8px;background:rgba(255,255,255,.07);
  border-radius:100px;overflow:hidden;min-width:100px;
}
.overall-fill{height:100%;border-radius:100px}
.overall-pct{font-family:var(--fmono);font-size:.82rem;font-weight:700}

/* ── STUDENT DETAIL DRAWER ── */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(2,8,24,.7);
  backdrop-filter:blur(4px);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;right:0;top:0;bottom:0;width:520px;max-width:95vw;
  background:var(--bg1);border-left:1px solid rgba(41,121,255,.2);
  z-index:201;transform:translateX(100%);transition:transform .3s ease;
  overflow-y:auto;
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  padding:28px 28px 20px;
  border-bottom:1px solid rgba(41,121,255,.12);
  position:sticky;top:0;background:var(--bg1);z-index:1;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.close-btn{
  background:rgba(255,255,255,.06);border:none;color:var(--txtm);
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.close-btn:hover{background:rgba(255,82,82,.15);color:var(--danger)}
.drawer-body{padding:24px 28px}
.drawer-avatar{
  width:56px;height:56px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--blueu));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fhead);font-size:1.6rem;color:#fff;margin-bottom:16px;
}
.drawer-name{font-family:var(--fhead);font-size:1.6rem;color:#fff;letter-spacing:.04em}
.drawer-email{font-size:.85rem;color:var(--txtm);margin-top:4px}
.drawer-meta{
  display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;
}
.meta-chip{
  background:rgba(41,121,255,.08);border:1px solid rgba(41,121,255,.18);
  padding:4px 12px;border-radius:100px;font-size:.75rem;
  font-family:var(--fmono);color:var(--txtm);
}

.section-title{
  font-family:var(--fmono);font-size:.72rem;color:var(--txtm);
  letter-spacing:.1em;text-transform:uppercase;margin:24px 0 14px;
  display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:rgba(41,121,255,.12)}

.course-card{
  background:var(--bg2);border:1px solid rgba(41,121,255,.1);
  border-radius:var(--r);padding:16px 18px;margin-bottom:12px;
}
.course-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.course-card-name{font-weight:600;font-size:.9rem}
.course-card-pct{font-family:var(--fhead);font-size:1.3rem;color:var(--blue);letter-spacing:.04em}
.course-track{height:6px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;margin-bottom:10px}
.course-fill{height:100%;border-radius:100px}
.module-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.module-name{font-size:.78rem;color:var(--txtd);font-family:var(--fmono)}
.module-dots{display:flex;gap:4px}
.dot{
  width:12px;height:12px;border-radius:3px;
  background:rgba(255,255,255,.08);
  transition:background .2s;
}
.dot.done{background:var(--ok)}
.dot.partial{background:var(--warn)}

/* ── TIMELINE ── */
.timeline{list-style:none;position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:rgba(41,121,255,.15)}
.tl-item{position:relative;padding:0 0 16px 20px}
.tl-item::before{
  content:'';position:absolute;left:-9px;top:6px;
  width:9px;height:9px;border-radius:50%;border:2px solid var(--blue);
  background:var(--bg1);
}
.tl-time{font-family:var(--fmono);font-size:.7rem;color:var(--txtd)}
.tl-text{font-size:.85rem;color:var(--txtm);margin-top:2px}
.tl-text strong{color:var(--txt)}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:80px 20px;color:var(--txtm)}
.empty-icon{font-size:3rem;margin-bottom:16px}
.loading-row td{padding:30px!important}
.spinner{
  width:32px;height:32px;border:3px solid rgba(41,121,255,.2);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  main{padding:24px 16px}
  .topbar{padding:0 16px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .table-wrap{overflow-x:auto}
  thead th:nth-child(n+4){display:none}
  tbody td:nth-child(n+4){display:none}
  .drawer{width:100%;border-left:none;border-top:1px solid rgba(41,121,255,.2);top:auto;transform:translateY(100%)}
  .drawer.open{transform:translateY(0)}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:rgba(41,121,255,.3);border-radius:3px}

/* ── ACCESS GRANT ─────────────────────────────────────── */
.access-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-top:12px; }
.access-card {
  background:var(--bg2); border:1px solid rgba(41,121,255,.12);
  border-radius:8px; padding:12px 14px;
  display:flex; flex-direction:column; gap:8px;
}
.access-card-name { font-size:.78rem; color:var(--txtm); font-family:var(--fmono); }
.access-card-icon { font-size:1rem; }
.access-toggle {
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
}
.toggle-track {
  width:40px; height:22px; border-radius:100px;
  background:rgba(255,255,255,.1); position:relative;
  transition:background .25s; flex-shrink:0;
}
.toggle-track.on { background:var(--ok); }
.toggle-thumb {
  width:16px; height:16px; border-radius:50%; background:#fff;
  position:absolute; top:3px; left:3px; transition:left .25s;
}
.toggle-track.on .toggle-thumb { left:21px; }
.access-status { font-size:.72rem; font-family:var(--fmono); }
.access-status.paid  { color:var(--ok); }
.access-status.free  { color:var(--txtd); }
.save-access-btn {
  background:rgba(0,230,118,.1); border:1px solid rgba(0,230,118,.25);
  color:var(--ok); font-family:var(--fmono); font-size:.75rem;
  padding:6px 14px; border-radius:6px; cursor:pointer;
  transition:all .2s; margin-top:8px; width:100%;
}
.save-access-btn:hover { background:rgba(0,230,118,.2); }
.drawer-search {
  background:var(--bg2); border:1px solid rgba(41,121,255,.18);
  color:var(--txt); font-family:var(--fbody); font-size:.88rem;
  padding:9px 14px; border-radius:8px; width:100%; margin-bottom:16px;
}
.drawer-search:focus { outline:none; border-color:var(--blue); }
.access-saving { font-family:var(--fmono); font-size:.75rem; color:var(--warn); margin-top:4px; }
.price-badge {
  font-family:var(--fmono); font-size:.7rem; color:var(--warn);
  background:rgba(255,171,64,.1); border:1px solid rgba(255,171,64,.2);
  padding:2px 8px; border-radius:100px; margin-left:6px;
}

</style>
</head>

<header class="topbar">
  <div class="logo">FMM <span>/</span> ACADEMY</div>
  <div class="topbar-right">
    <span class="badge">INSTRUCTOR DASHBOARD</span>
    <a href="payment-settings.html" class="btn btn-ghost">💳 Payment Settings</a>
    <a href="dashboard.html" class="btn btn-ghost">← Back to Site</a>

<main>

  <div class="page-header">

      <div class="stat-val" id="s-complete">—</div>
      <div class="stat-label">COURSES COMPLETED</div>

      <div class="stat-val" id="s-lessons">—</div>

  <!-- TOOLBAR -->

      <option value="web-dev">Website Development</option>

      <option value="">All Status</option>
      <option value="active">Active</option>
      <option value="idle">Idle</option>
      <option value="new">New</option>
    </select>
    <button class="sort-btn active" id="sort-progress" onclick="sortBy('progress')">Sort: Progress ↕</button>
    <div class="ml-auto">
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>

  <!-- TABLE -->
  <div class="table-wrap">

          <th onclick="sortBy('last')">Last Active</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="student-tbody">
        <tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- STUDENT DETAIL DRAWER -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <div class="drawer-avatar" id="d-avatar"></div>
      <div class="drawer-name" id="d-name"></div>
      <div class="drawer-email" id="d-email"></div>
      <div class="drawer-meta" id="d-meta"></div>
    </div>
    <button class="close-btn" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
const SB_URL = 'https://dtawdhstvcklwyngatwa.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0YXdkaHN0dmNrbHd5bmdhdHdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDY2OTMsImV4cCI6MjA4ODg4MjY5M30.VHFPpU3MkBOBBoJtCk4c_27CmnhIHkYZpPMc2AefqbA';

const COURSES = {
  'web-dev':   { name:'Website Development',  total:32, color:'#2979ff', icon:'🌐' },
  'wordpress': { name:'WordPress Design',      total:24, color:'#7c4dff', icon:'🔷' },
  'seo':       { name:'SEO Mastery',           total:28, color:'#00e676', icon:'🔍' },
  'hosting':   { name:'Hosting & Maintenance', total:20, color:'#ffab40', icon:'🖥️' },
  'ecommerce': { name:'E-Commerce Mastery',    total:32, color:'#ff5252', icon:'🛒' },
};
const COURSE_PRICES = {
  'web-dev':   { label:'Advanced',     price:10000 },
  'wordpress': { label:'Intermediate', price:5000  },
  'seo':       { label:'Intermediate', price:5000  },
  'hosting':   { label:'Beginner',     price:3000  },
  'ecommerce': { label:'Advanced',     price:10000 },
};

let sb, allStudents = [], filtered = [], sortDir = { col:'progress', dir:-1 };
let pendingAccess = {};

window.addEventListener('DOMContentLoaded', async () => {
  if (!window.supabase) { setStatus('Supabase SDK failed to load.'); return; }
  sb = window.supabase.createClient(SB_URL, SB_KEY);
  loadAllStudents();
});

// DATA SOURCES:
// profiles             => id, role  (WHERE role = 'student')
// user_progress_summary => user_id, full_name, email, created_at, progress_data, updated_at
// course_access        => user_id, course_id, granted
async function loadAllStudents() {
  setSpinner();
  try {
    const [profRes, progRes, accessRes] = await Promise.all([
      sb.from('profiles').select('id, role, email').eq('role', 'student'),
      sb.from('user_progress_summary').select('user_id, full_name, email, created_at, progress_data, updated_at'),
      sb.from('course_access').select('user_id, course_id, granted'),
    ]);

    if (profRes.error)  throw new Error('profiles: ' + profRes.error.message);
    if (progRes.error)  throw new Error('user_progress_summary: ' + progRes.error.message);

    const profiles  = profRes.data  || [];
    const progRows  = progRes.data  || [];
    const accessRows = accessRes.data || [];

    // Index by user_id
    const progByUser   = {};
    progRows.forEach(r => { if (r.user_id) progByUser[r.user_id] = r; });

    const accessByUser = {};
    accessRows.forEach(r => {
      if (!accessByUser[r.user_id]) accessByUser[r.user_id] = {};
      accessByUser[r.user_id][r.course_id] = r.granted;
    });

    allStudents = profiles.map(p => {
      const prog    = progByUser[p.id] || {};
      const rawData = prog.progress_data || {};
      const name    = prog.full_name || p.email?.split('@')[0] || 'Unknown';
      const email   = prog.email || p.email || '—';
      const enrolled   = prog.created_at  || null;
      const lastActive = prog.updated_at  || null;

      const courses = {};
      let totalDone = 0, totalPossible = 0;
      Object.entries(COURSES).forEach(([cid, info]) => {
        const done = (rawData[cid] && typeof rawData[cid] === 'object')
          ? Object.values(rawData[cid]).flat().length : 0;
        courses[cid] = { done, total: info.total, pct: Math.round(done / info.total * 100) };
        totalDone += done; totalPossible += info.total;
      });

      const overallPct = Math.round(totalDone / totalPossible * 100);
      const daysSince  = lastActive ? Math.floor((Date.now() - new Date(lastActive)) / 86400000) : 999;
      const status     = !lastActive ? 'new' : daysSince <= 7 ? 'active' : 'idle';
      const access     = accessByUser[p.id] || {};
      const needsAccess = Object.entries(courses).some(([cid, cv]) => cv.pct >= 50 && !access[cid]);

      return { id:p.id, name, email, enrolled, lastActive, daysSince, courses, overallPct, totalDone, status, rawProgress:rawData, access, needsAccess };
    });

    filtered = [...allStudents];
    renderStats(); renderTable();
    const waiting = allStudents.filter(s => s.needsAccess).length;
    document.getElementById('sub-text').innerHTML =
      `${allStudents.length} students · refreshed ${new Date().toLocaleTimeString()}` +
      (waiting ? ` &nbsp;<span style="background:rgba(255,82,82,.15);border:1px solid rgba(255,82,82,.35);color:#ff5252;font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:2px 10px;border-radius:100px">🔒 ${waiting} awaiting access</span>` : '');

  } catch(err) {
    document.getElementById('student-tbody').innerHTML =
      `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--danger)">⚠️ ${esc(err.message)}</td></tr>`;
    setStatus('⚠️ Error loading data');
    console.error('[FMM]', err);
  }
}

function renderStats() {
  const t = allStudents.length;
  document.getElementById('s-total').textContent    = t;
  document.getElementById('s-active').textContent   = allStudents.filter(s=>s.status==='active').length;
  document.getElementById('s-avg').innerHTML        = `${t?Math.round(allStudents.reduce((a,s)=>a+s.overallPct,0)/t):0}<span>%</span>`;
  document.getElementById('s-complete').textContent = allStudents.filter(s=>s.overallPct===100).length;
  document.getElementById('s-lessons').textContent  = allStudents.reduce((a,s)=>a+s.totalDone,0);
}

function renderTable() {
  const tbody = document.getElementById('student-tbody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">🎓</div>
      <p>No students found. Ensure <strong>profiles</strong> has rows with <code>role = 'student'</code>
      and the anon key has SELECT access on both tables.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(s => {
    const initials  = s.name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'??';
    const enrolled  = s.enrolled ? new Date(s.enrolled).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const lastSeen  = !s.lastActive?'Never':s.daysSince===0?'Today':s.daysSince===1?'Yesterday':`${s.daysSince}d ago`;
    const statusMap   = {active:'status-active',idle:'status-idle',new:'status-new'};
    const statusLabel = {active:'● Active',idle:'○ Idle',new:'✦ New'};
    const topCourses  = Object.entries(s.courses).filter(([,v])=>v.pct>0).sort((a,b)=>b[1].pct-a[1].pct).slice(0,3);
    const barsHtml    = topCourses.length
      ? topCourses.map(([cid,v])=>`<div class="prog-row"><span class="course-label" style="width:12px">${COURSES[cid].icon}</span><div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${v.pct}%;background:${COURSES[cid].color}"></div></div><span class="prog-pct">${v.pct}%</span></div>`).join('')
      : '<span style="color:var(--txtd);font-size:.78rem;font-family:var(--fmono)">No activity yet</span>';
    const fillColor = s.overallPct>=80?'var(--ok)':s.overallPct>=40?'var(--blue)':'var(--warn)';
    const lockBadge = s.needsAccess
      ? `<span style="background:rgba(255,82,82,.12);border:1px solid rgba(255,82,82,.3);color:#ff5252;font-family:'JetBrains Mono',monospace;font-size:.67rem;padding:2px 8px;border-radius:100px;display:inline-block;margin-top:3px">🔒 Needs access</span>` : '';
    const grantBtn = s.needsAccess
      ? `<button class="export-btn" style="background:rgba(0,230,118,.15);border-color:rgba(0,230,118,.5);color:var(--ok);font-weight:700" onclick="grantAllAccess('${s.id}',event)">✅ Grant Access</button>`
      : `<button class="export-btn" style="opacity:.6" onclick="grantAllAccess('${s.id}',event)">✅ Grant</button>`;

    return `<tr onclick="openDrawer('${s.id}')" style="cursor:pointer">
      <td><div class="student-cell"><div class="avatar">${initials}</div><div>
        <div class="student-name">${esc(s.name)}</div>
        <div class="student-email">${esc(s.email)}</div>${lockBadge}
      </div></div></td>
      <td style="color:var(--txtm);font-size:.82rem">${enrolled}</td>
      <td class="prog-cell"><div class="overall-bar"><div class="overall-track"><div class="overall-fill" style="width:${s.overallPct}%;background:${fillColor}"></div></div><span class="overall-pct" style="color:${fillColor}">${s.overallPct}%</span></div><div style="font-size:.72rem;color:var(--txtd);margin-top:4px;font-family:var(--fmono)">${s.totalDone} lessons complete</div></td>
      <td class="prog-cell">${barsHtml}</td>
      <td style="color:var(--txtm);font-size:.82rem;font-family:var(--fmono)">${lastSeen}</td>
      <td><span class="status ${statusMap[s.status]}">${statusLabel[s.status]}</span></td>
      <td style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <button class="export-btn" onclick="event.stopPropagation();openDrawer('${s.id}')">View →</button>
        ${grantBtn}
      </td>
    </tr>`;
  }).join('');
}

function filterTable() {
  const q=document.getElementById('search-inp').value.toLowerCase();
  const course=document.getElementById('course-filter').value;
  const status=document.getElementById('status-filter').value;
  filtered=allStudents.filter(s=>(!q||s.name.toLowerCase().includes(q)||s.email.toLowerCase().includes(q))&&(!course||s.courses[course]?.pct>0)&&(!status||s.status===status));
  applySort(); renderTable();
}
function sortBy(col){sortDir.dir=sortDir.col===col?sortDir.dir*-1:-1;sortDir.col=col;applySort();renderTable();}
function applySort(){filtered.sort((a,b)=>{const va=sortDir.col==='name'?a.name:sortDir.col==='enrolled'?(a.enrolled||''):sortDir.col==='last'?(a.lastActive||''):a.overallPct;const vb=sortDir.col==='name'?b.name:sortDir.col==='enrolled'?(b.enrolled||''):sortDir.col==='last'?(b.lastActive||''):b.overallPct;return va<vb?sortDir.dir:va>vb?-sortDir.dir:0;});}

async function openDrawer(userId) {
  const s = allStudents.find(x=>x.id===userId); if(!s) return;
  document.getElementById('d-avatar').textContent=s.name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
  document.getElementById('d-name').textContent=s.name;
  document.getElementById('d-email').textContent=s.email;
  const enrolled=s.enrolled?new Date(s.enrolled).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'Unknown';
  document.getElementById('d-meta').innerHTML=`<span class="meta-chip">📅 Joined ${enrolled}</span><span class="meta-chip">📚 ${s.totalDone} lessons</span><span class="meta-chip">🎯 ${s.overallPct}% overall</span>${s.needsAccess?'<span class="meta-chip" style="border-color:rgba(255,82,82,.4);color:#ff5252">🔒 Blocked awaiting payment</span>':''}`;

  const freshAccess = await loadStudentAccess(userId);
  s.access = freshAccess;

  const courseCards = Object.entries(COURSES).map(([cid,info])=>{
    const cv=s.courses[cid]; const granted=!!freshAccess[cid]; const blocked=cv.pct>=50&&!granted;
    return `<div class="course-card" style="${blocked?'border-color:rgba(255,82,82,.35)':''}">
      <div class="course-card-head"><span class="course-card-name">${info.icon} ${info.name}</span><span class="course-card-pct" style="color:${info.color}">${cv.pct}%</span></div>
      <div class="course-track"><div class="course-fill" style="width:${cv.pct}%;background:${info.color}"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
        <span style="font-size:.78rem;color:var(--txtd);font-family:var(--fmono)">${cv.done}/${cv.total} lessons</span>
        ${blocked?`<span style="color:#ff5252;font-family:var(--fmono);font-size:.72rem">🔒 Blocked at 50%</span>`:granted?`<span style="color:var(--ok);font-family:var(--fmono);font-size:.72rem">✅ Full access</span>`:''}
      </div></div>`;
  }).join('');

  document.getElementById('drawer-body').innerHTML=`
    <div class="section-title">COURSE PROGRESS</div>${courseCards}
    <div class="section-title">ACCESS MANAGEMENT</div>
    <p style="color:var(--txtm);font-size:.85rem;line-height:1.65;margin-bottom:16px">Students are <strong style="color:#fff">blocked at 50%</strong> of each course until you grant access after payment. Toggle courses below and save.</p>
    ${buildAccessCards(userId,freshAccess)}
    <button class="save-access-btn" onclick="saveAccess('${userId}')">💾 Save Access Changes</button>
    <div class="access-saving" id="access-saving-${userId}"></div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button onclick="quickGrantAll('${userId}')" style="background:rgba(0,230,118,.12);border:1px solid rgba(0,230,118,.35);color:var(--ok);font-family:var(--fmono);font-size:.78rem;padding:8px 18px;border-radius:8px;cursor:pointer">✅ Grant All Courses</button>
      <button onclick="quickRevokeAll('${userId}')" style="background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.25);color:#ff5252;font-family:var(--fmono);font-size:.78rem;padding:8px 18px;border-radius:8px;cursor:pointer">⛔ Revoke All</button>
    </div>
    <div class="section-title" style="margin-top:28px">LESSON COMPLETION MAP</div>${buildLessonGrid(s.rawProgress)}
    <div class="section-title">ACTIVITY</div><ul class="timeline">${buildTimeline(s.rawProgress,s.lastActive)}</ul>
    <div style="margin-top:24px"><button class="export-btn" onclick="exportStudentCSV('${userId}')">⬇ Export CSV</button></div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer(){document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');}

function buildAccessCards(userId,accessMap){
  return `<div class="access-grid">`+Object.entries(COURSES).map(([cid,info])=>{
    const granted=!!accessMap[cid]; const price=COURSE_PRICES[cid];
    return `<div class="access-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:1.1rem">${info.icon}</span><span class="access-card-name">${info.name}</span></div>
      <div class="access-toggle" onclick="toggleAccess('${userId}','${cid}')">
        <span class="access-status ${granted?'paid':'free'}" id="acc-status-${userId}-${cid}">${granted?'✅ Access Granted':'⛔ Locked'}</span>
        <div class="toggle-track ${granted?'on':''}" id="acc-toggle-${userId}-${cid}"><div class="toggle-thumb"></div></div>
      </div>
      <div style="font-family:var(--fmono);font-size:.68rem;color:var(--txtd);margin-top:4px">${price.label} · KES ${price.price.toLocaleString()}</div>
    </div>`;
  }).join('')+`</div>`;
}

function toggleAccess(userId,courseId){
  const track=document.getElementById(`acc-toggle-${userId}-${courseId}`);
  const status=document.getElementById(`acc-status-${userId}-${courseId}`);
  const isOn=track.classList.contains('on');
  track.classList.toggle('on',!isOn);
  status.textContent=isOn?'⛔ Locked':'✅ Access Granted';
  status.className='access-status '+(isOn?'free':'paid');
  if(!pendingAccess[userId])pendingAccess[userId]={};
  pendingAccess[userId][courseId]=!isOn;
}

async function saveAccess(userId){
  const saving=document.getElementById(`access-saving-${userId}`);
  const pending=pendingAccess[userId]||{};
  if(!Object.keys(pending).length){saving.textContent='No changes to save.';setTimeout(()=>saving.textContent='',2000);return;}
  saving.textContent='⏳ Saving…';
  try{
    const{error}=await sb.from('course_access').upsert(Object.entries(pending).map(([cid,granted])=>({user_id:userId,course_id:cid,granted,updated_at:new Date().toISOString()})),{onConflict:'user_id,course_id'});
    if(error)throw error;
    pendingAccess[userId]={};
    saving.textContent='✅ Saved — student can continue!';
    setTimeout(()=>saving.textContent='',5000);
    await loadAllStudents();
  }catch(err){saving.textContent='❌ '+err.message;}
}

async function quickGrantAll(userId){
  const saving=document.getElementById(`access-saving-${userId}`);
  saving.textContent='⏳ Granting…';
  try{
    const{error}=await sb.from('course_access').upsert(Object.keys(COURSES).map(cid=>({user_id:userId,course_id:cid,granted:true,updated_at:new Date().toISOString()})),{onConflict:'user_id,course_id'});
    if(error)throw error;
    Object.keys(COURSES).forEach(cid=>{
      const t=document.getElementById(`acc-toggle-${userId}-${cid}`);const s=document.getElementById(`acc-status-${userId}-${cid}`);
      if(t)t.classList.add('on');if(s){s.textContent='✅ Access Granted';s.className='access-status paid';}
    });
    pendingAccess[userId]={};
    saving.textContent='✅ All courses unlocked!';
    setTimeout(()=>saving.textContent='',5000);
    showToast('✅ Full access granted!');
    await loadAllStudents();
  }catch(err){saving.textContent='❌ '+err.message;}
}

async function quickRevokeAll(userId){
  const saving=document.getElementById(`access-saving-${userId}`);
  saving.textContent='⏳ Revoking…';
  try{
    const{error}=await sb.from('course_access').upsert(Object.keys(COURSES).map(cid=>({user_id:userId,course_id:cid,granted:false,updated_at:new Date().toISOString()})),{onConflict:'user_id,course_id'});
    if(error)throw error;
    Object.keys(COURSES).forEach(cid=>{
      const t=document.getElementById(`acc-toggle-${userId}-${cid}`);const s=document.getElementById(`acc-status-${userId}-${cid}`);
      if(t)t.classList.remove('on');if(s){s.textContent='⛔ Locked';s.className='access-status free';}
    });
    pendingAccess[userId]={};saving.textContent='⛔ All access revoked.';setTimeout(()=>saving.textContent='',4000);
    await loadAllStudents();
  }catch(err){saving.textContent='❌ '+err.message;}
}

async function grantAllAccess(userId,event){
  event.stopPropagation();
  try{
    const{error}=await sb.from('course_access').upsert(Object.keys(COURSES).map(cid=>({user_id:userId,course_id:cid,granted:true,updated_at:new Date().toISOString()})),{onConflict:'user_id,course_id'});
    if(error)throw error;
    showToast('✅ Full access granted!');await loadAllStudents();
  }catch(err){showToast('❌ '+err.message);}
}

async function loadStudentAccess(userId){
  try{const{data,error}=await sb.from('course_access').select('course_id,granted').eq('user_id',userId);if(error)throw error;const map={};(data||[]).forEach(r=>{map[r.course_id]=r.granted;});return map;}catch(e){return{};}
}

function buildLessonGrid(rawProgress){
  return Object.entries(COURSES).map(([cid,info])=>{
    const mods=(rawProgress&&rawProgress[cid])||{};
    const dots=Object.entries(mods).map(([mid,lids])=>(Array.isArray(lids)?lids:[]).map(lid=>`<div class="dot done" title="${mid}/${lid}"></div>`).join('')).join('');
    const done=Object.values(mods).flat().length;
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px"><span style="font-size:.75rem;color:var(--txtd);font-family:var(--fmono);min-width:22px">${info.icon}</span><div style="display:flex;flex-wrap:wrap;gap:4px;flex:1">${dots||'<span style="color:var(--txtd);font-size:.72rem;font-family:var(--fmono)">No lessons completed</span>'}</div><span style="font-family:var(--fmono);font-size:.72rem;color:var(--txtm);min-width:40px;text-align:right">${done}/${info.total}</span></div>`;
  }).join('');
}

function buildTimeline(rawProgress,lastActive){
  const events=[];Object.entries(COURSES).forEach(([cid,info])=>{const done=rawProgress&&rawProgress[cid]?Object.values(rawProgress[cid]).flat().length:0;if(done>0)events.push(`Completed ${done} lesson${done>1?'s':''} in <strong>${info.name}</strong>`);});
  if(!events.length)return`<li class="tl-item"><div class="tl-text" style="color:var(--txtd)">No activity recorded yet</div></li>`;
  const lastStr=lastActive?new Date(lastActive).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'Unknown';
  return events.map(label=>`<li class="tl-item"><div class="tl-time">${lastStr}</div><div class="tl-text">${label}</div></li>`).join('')+`<li class="tl-item"><div class="tl-time">Enrolled</div><div class="tl-text">Student joined FMM Academy</div></li>`;
}

function exportCSV(){const rows=[['Name','Email','Enrolled','Last Active','Overall %','Status','Needs Access',...Object.values(COURSES).map(c=>c.name+' %')]];filtered.forEach(s=>rows.push([s.name,s.email,s.enrolled?new Date(s.enrolled).toLocaleDateString():'',s.lastActive?new Date(s.lastActive).toLocaleDateString():'Never',s.overallPct,s.status,s.needsAccess?'Yes':'No',...Object.keys(COURSES).map(cid=>s.courses[cid].pct)]));downloadCSV(rows,'fmm-students.csv');}
function exportStudentCSV(userId){const s=allStudents.find(x=>x.id===userId);if(!s)return;const rows=[['Course','Lessons Done','Total','%','Access']];Object.entries(COURSES).forEach(([cid,info])=>{const cv=s.courses[cid];rows.push([info.name,cv.done,cv.total,cv.pct+'%',s.access[cid]?'Yes':'No']);});downloadCSV(rows,`${s.name.replace(/\s+/g,'-').toLowerCase()}-progress.csv`);}
function downloadCSV(rows,filename){const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=filename;a.click();}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setStatus(msg){const el=document.getElementById('sub-text');if(el)el.textContent=msg;}
function setSpinner(){document.getElementById('student-tbody').innerHTML='<tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>';setStatus('Loading student data…');}
function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;padding:12px 28px;border-radius:100px;font-family:"JetBrains Mono",monospace;font-size:.84rem;font-weight:700;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4)';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
</script>
</body>
</html>
