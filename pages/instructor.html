<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instructor Dashboard — FMM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#020818;--bg1:#060e24;--bg2:#0b1535;--bg3:#0f1c42;
  --blue:#2979ff;--blueu:#00c3ff;--glow:rgba(41,121,255,.25);
  --txt:#c8daf5;--txtm:#7a9cc8;--txtd:#3a5a8a;
  --ok:#00e676;--warn:#ffab40;--danger:#ff5252;
  --fhead:'Bebas Neue',sans-serif;
  --fbody:'Outfit',sans-serif;
  --fmono:'JetBrains Mono',monospace;
  --r:10px;
}
html{font-size:16px;background:var(--bg0);color:var(--txt);font-family:var(--fbody)}
body{min-height:100vh;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(2,8,24,.92);
  border-bottom:1px solid rgba(41,121,255,.15);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:64px;
}
.logo{font-family:var(--fhead);font-size:1.5rem;color:#fff;letter-spacing:.08em}
.logo span{color:var(--blue)}
.badge{
  background:rgba(41,121,255,.15);border:1px solid rgba(41,121,255,.3);
  color:var(--blue);font-family:var(--fmono);font-size:.72rem;
  padding:4px 12px;border-radius:100px;letter-spacing:.05em;
}
.topbar-right{display:flex;align-items:center;gap:16px}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--fbody);font-size:.88rem;font-weight:600;
  padding:8px 20px;border-radius:8px;border:none;cursor:pointer;
  transition:all .2s ease;text-decoration:none;
}
.btn-ghost{background:transparent;border:1px solid rgba(41,121,255,.3);color:var(--txtm)}
.btn-ghost:hover{border-color:var(--blue);color:var(--txt)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1565c0;transform:translateY(-1px)}

/* ── MAIN LAYOUT ── */
main{flex:1;padding:40px 32px;max-width:1400px;width:100%;margin:0 auto}

/* ── PAGE HEADER ── */
.page-header{margin-bottom:40px}
.page-header h1{font-family:var(--fhead);font-size:2.8rem;letter-spacing:.06em;color:#fff;line-height:1}
.page-header p{color:var(--txtm);margin-top:8px;font-size:.95rem}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:40px}
.stat-card{
  background:var(--bg1);border:1px solid rgba(41,121,255,.12);
  border-radius:var(--r);padding:24px;
  transition:border-color .2s;
}
.stat-card:hover{border-color:rgba(41,121,255,.3)}
.stat-val{font-family:var(--fhead);font-size:2.6rem;color:#fff;letter-spacing:.04em;line-height:1}
.stat-val span{font-size:1.4rem;color:var(--blue)}
.stat-label{font-size:.82rem;color:var(--txtm);margin-top:6px;font-family:var(--fmono);letter-spacing:.03em}
.stat-delta{font-size:.78rem;color:var(--ok);margin-top:4px}

/* ── TOOLBAR ── */
.toolbar{
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  margin-bottom:24px;
}
.search-wrap{
  position:relative;flex:1;min-width:200px;max-width:340px;
}
.search-wrap input{
  width:100%;background:var(--bg1);border:1px solid rgba(41,121,255,.2);
  border-radius:8px;padding:9px 16px 9px 38px;
  color:var(--txt);font-family:var(--fbody);font-size:.88rem;
}
.search-wrap input:focus{outline:none;border-color:var(--blue)}
.search-wrap input::placeholder{color:var(--txtd)}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txtd);font-size:.9rem}
.filter-sel{
  background:var(--bg1);border:1px solid rgba(41,121,255,.2);
  color:var(--txt);font-family:var(--fbody);font-size:.85rem;
  padding:9px 14px;border-radius:8px;cursor:pointer;
}
.filter-sel:focus{outline:none;border-color:var(--blue)}
.sort-btn{
  background:var(--bg2);border:1px solid rgba(41,121,255,.15);
  color:var(--txtm);padding:9px 14px;border-radius:8px;
  font-family:var(--fmono);font-size:.78rem;cursor:pointer;
  transition:all .2s;
}
.sort-btn:hover,.sort-btn.active{border-color:var(--blue);color:var(--blue)}
.ml-auto{margin-left:auto}
.export-btn{
  background:rgba(0,195,255,.08);border:1px solid rgba(0,195,255,.25);
  color:var(--blueu);font-size:.82rem;padding:8px 16px;
  border-radius:8px;cursor:pointer;font-family:var(--fmono);
  transition:all .2s;display:flex;align-items:center;gap:6px;
}
.export-btn:hover{background:rgba(0,195,255,.15)}

/* ── TABLE ── */
.table-wrap{
  background:var(--bg1);border:1px solid rgba(41,121,255,.12);
  border-radius:var(--r);overflow:hidden;
}
.table-wrap table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg2);border-bottom:1px solid rgba(41,121,255,.15)}
thead th{
  padding:14px 16px;text-align:left;
  font-family:var(--fmono);font-size:.72rem;color:var(--txtm);
  letter-spacing:.08em;text-transform:uppercase;font-weight:400;
  white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--txt)}
thead th.sort-asc::after{content:' ↑'}
thead th.sort-desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid rgba(41,121,255,.07);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(41,121,255,.05)}
tbody td{padding:14px 16px;font-size:.875rem;color:var(--txt)}

/* student cell */
.student-cell{display:flex;align-items:center;gap:12px}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--blueu));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fhead);font-size:1rem;color:#fff;flex-shrink:0;
}
.student-name{font-weight:600;color:#fff}
.student-email{font-size:.78rem;color:var(--txtm);margin-top:2px}

/* progress bars */
.prog-cell{min-width:180px}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.prog-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:100px;transition:width .4s ease}
.prog-pct{font-family:var(--fmono);font-size:.75rem;color:var(--txtm);min-width:32px;text-align:right}
.course-label{font-size:.7rem;color:var(--txtd);font-family:var(--fmono)}

/* status badge */
.status{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:.75rem;
  font-family:var(--fmono);font-weight:700;
}
.status-active{background:rgba(0,230,118,.1);color:var(--ok);border:1px solid rgba(0,230,118,.25)}
.status-idle{background:rgba(255,171,64,.1);color:var(--warn);border:1px solid rgba(255,171,64,.25)}
.status-new{background:rgba(41,121,255,.1);color:var(--blue);border:1px solid rgba(41,121,255,.25)}

/* overall bar */
.overall-bar{
  display:flex;align-items:center;gap:10px;
}
.overall-track{
  flex:1;height:8px;background:rgba(255,255,255,.07);
  border-radius:100px;overflow:hidden;min-width:100px;
}
.overall-fill{height:100%;border-radius:100px}
.overall-pct{font-family:var(--fmono);font-size:.82rem;font-weight:700}

/* ── STUDENT DETAIL DRAWER ── */
.drawer-overlay{
  position:fixed;inset:0;background:rgba(2,8,24,.7);
  backdrop-filter:blur(4px);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;right:0;top:0;bottom:0;width:520px;max-width:95vw;
  background:var(--bg1);border-left:1px solid rgba(41,121,255,.2);
  z-index:201;transform:translateX(100%);transition:transform .3s ease;
  overflow-y:auto;
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  padding:28px 28px 20px;
  border-bottom:1px solid rgba(41,121,255,.12);
  position:sticky;top:0;background:var(--bg1);z-index:1;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.close-btn{
  background:rgba(255,255,255,.06);border:none;color:var(--txtm);
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.close-btn:hover{background:rgba(255,82,82,.15);color:var(--danger)}
.drawer-body{padding:24px 28px}
.drawer-avatar{
  width:56px;height:56px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--blueu));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fhead);font-size:1.6rem;color:#fff;margin-bottom:16px;
}
.drawer-name{font-family:var(--fhead);font-size:1.6rem;color:#fff;letter-spacing:.04em}
.drawer-email{font-size:.85rem;color:var(--txtm);margin-top:4px}
.drawer-meta{
  display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;
}
.meta-chip{
  background:rgba(41,121,255,.08);border:1px solid rgba(41,121,255,.18);
  padding:4px 12px;border-radius:100px;font-size:.75rem;
  font-family:var(--fmono);color:var(--txtm);
}

.section-title{
  font-family:var(--fmono);font-size:.72rem;color:var(--txtm);
  letter-spacing:.1em;text-transform:uppercase;margin:24px 0 14px;
  display:flex;align-items:center;gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:rgba(41,121,255,.12)}

.course-card{
  background:var(--bg2);border:1px solid rgba(41,121,255,.1);
  border-radius:var(--r);padding:16px 18px;margin-bottom:12px;
}
.course-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.course-card-name{font-weight:600;font-size:.9rem}
.course-card-pct{font-family:var(--fhead);font-size:1.3rem;color:var(--blue);letter-spacing:.04em}
.course-track{height:6px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden;margin-bottom:10px}
.course-fill{height:100%;border-radius:100px}
.module-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.module-name{font-size:.78rem;color:var(--txtd);font-family:var(--fmono)}
.module-dots{display:flex;gap:4px}
.dot{
  width:12px;height:12px;border-radius:3px;
  background:rgba(255,255,255,.08);
  transition:background .2s;
}
.dot.done{background:var(--ok)}
.dot.partial{background:var(--warn)}

/* ── TIMELINE ── */
.timeline{list-style:none;position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1px;background:rgba(41,121,255,.15)}
.tl-item{position:relative;padding:0 0 16px 20px}
.tl-item::before{
  content:'';position:absolute;left:-9px;top:6px;
  width:9px;height:9px;border-radius:50%;border:2px solid var(--blue);
  background:var(--bg1);
}
.tl-time{font-family:var(--fmono);font-size:.7rem;color:var(--txtd)}
.tl-text{font-size:.85rem;color:var(--txtm);margin-top:2px}
.tl-text strong{color:var(--txt)}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:80px 20px;color:var(--txtm)}
.empty-icon{font-size:3rem;margin-bottom:16px}
.loading-row td{padding:30px!important}
.spinner{
  width:32px;height:32px;border:3px solid rgba(41,121,255,.2);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  main{padding:24px 16px}
  .topbar{padding:0 16px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .table-wrap{overflow-x:auto}
  thead th:nth-child(n+4){display:none}
  tbody td:nth-child(n+4){display:none}
  .drawer{width:100%;border-left:none;border-top:1px solid rgba(41,121,255,.2);top:auto;transform:translateY(100%)}
  .drawer.open{transform:translateY(0)}
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:rgba(41,121,255,.3);border-radius:3px}

/* ── ACCESS GRANT ─────────────────────────────────────── */
.access-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-top:12px; }
.access-card {
  background:var(--bg2); border:1px solid rgba(41,121,255,.12);
  border-radius:8px; padding:12px 14px;
  display:flex; flex-direction:column; gap:8px;
}
.access-card-name { font-size:.78rem; color:var(--txtm); font-family:var(--fmono); }
.access-card-icon { font-size:1rem; }
.access-toggle {
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer;
}
.toggle-track {
  width:40px; height:22px; border-radius:100px;
  background:rgba(255,255,255,.1); position:relative;
  transition:background .25s; flex-shrink:0;
}
.toggle-track.on { background:var(--ok); }
.toggle-thumb {
  width:16px; height:16px; border-radius:50%; background:#fff;
  position:absolute; top:3px; left:3px; transition:left .25s;
}
.toggle-track.on .toggle-thumb { left:21px; }
.access-status { font-size:.72rem; font-family:var(--fmono); }
.access-status.paid  { color:var(--ok); }
.access-status.free  { color:var(--txtd); }
.save-access-btn {
  background:rgba(0,230,118,.1); border:1px solid rgba(0,230,118,.25);
  color:var(--ok); font-family:var(--fmono); font-size:.75rem;
  padding:6px 14px; border-radius:6px; cursor:pointer;
  transition:all .2s; margin-top:8px; width:100%;
}
.save-access-btn:hover { background:rgba(0,230,118,.2); }
.drawer-search {
  background:var(--bg2); border:1px solid rgba(41,121,255,.18);
  color:var(--txt); font-family:var(--fbody); font-size:.88rem;
  padding:9px 14px; border-radius:8px; width:100%; margin-bottom:16px;
}
.drawer-search:focus { outline:none; border-color:var(--blue); }
.access-saving { font-family:var(--fmono); font-size:.75rem; color:var(--warn); margin-top:4px; }
.price-badge {
  font-family:var(--fmono); font-size:.7rem; color:var(--warn);
  background:rgba(255,171,64,.1); border:1px solid rgba(255,171,64,.2);
  padding:2px 8px; border-radius:100px; margin-left:6px;
}

</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="logo">FMM <span>/</span> ACADEMY</div>
  <div class="topbar-right">
    <span class="badge">INSTRUCTOR DASHBOARD</span>
    <a href="payment-settings.html" class="btn btn-ghost">💳 Payment Settings</a>
    <a href="dashboard.html" class="btn btn-ghost">← Back to Site</a>
    <button class="btn btn-primary" id="refresh-btn" onclick="loadAllStudents()">↻ Refresh</button>
  </div>
</header>

<main>
  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>STUDENT PROGRESS</h1>
    <p id="sub-text">Loading student data from Supabase…</p>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="s-total">—</div>
      <div class="stat-label">TOTAL STUDENTS</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-active">—</div>
      <div class="stat-label">ACTIVE (7 DAYS)</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-avg">—<span>%</span></div>
      <div class="stat-label">AVG COMPLETION</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-complete">—</div>
      <div class="stat-label">COURSES COMPLETED</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-lessons">—</div>
      <div class="stat-label">TOTAL LESSONS DONE</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input type="text" id="search-inp" placeholder="Search student name or email…" oninput="filterTable()">
    </div>
    <select class="filter-sel" id="course-filter" onchange="filterTable()">
      <option value="">All Courses</option>
      <option value="web-dev">Website Development</option>
      <option value="wordpress">WordPress Design</option>
      <option value="seo">SEO Mastery</option>
      <option value="hosting">Hosting & Maintenance</option>
      <option value="ecommerce">E-Commerce Mastery</option>
    </select>
    <select class="filter-sel" id="status-filter" onchange="filterTable()">
      <option value="">All Status</option>
      <option value="active">Active</option>
      <option value="idle">Idle</option>
      <option value="new">New</option>
    </select>
    <button class="sort-btn active" id="sort-progress" onclick="sortBy('progress')">Sort: Progress ↕</button>
    <div class="ml-auto">
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="student-table">
      <thead>
        <tr>
          <th onclick="sortBy('name')">Student</th>
          <th onclick="sortBy('enrolled')">Enrolled</th>
          <th onclick="sortBy('progress')">Overall Progress</th>
          <th>Course Breakdown</th>
          <th onclick="sortBy('last')">Last Active</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="student-tbody">
        <tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- STUDENT DETAIL DRAWER -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div>
      <div class="drawer-avatar" id="d-avatar"></div>
      <div class="drawer-name" id="d-name"></div>
      <div class="drawer-email" id="d-email"></div>
      <div class="drawer-meta" id="d-meta"></div>
    </div>
    <button class="close-btn" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────
const SB_URL = 'https://dtawdhstvcklwyngatwa.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0YXdkaHN0dmNrbHd5bmdhdHdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDY2OTMsImV4cCI6MjA4ODg4MjY5M30.VHFPpU3MkBOBBoJtCk4c_27CmnhIHkYZpPMc2AefqbA';

const COURSES = {
  'web-dev':   { name:'Website Development',  total:13, color:'#2979ff', icon:'🌐' },
  'wordpress': { name:'WordPress Design',      total:9,  color:'#7c4dff', icon:'🔷' },
  'seo':       { name:'SEO Mastery',           total:9,  color:'#00e676', icon:'🔍' },
  'hosting':   { name:'Hosting & Maintenance', total:7,  color:'#ffab40', icon:'🖥️' },
  'ecommerce': { name:'E-Commerce Mastery',    total:10, color:'#ff5252', icon:'🛒' },
};

// ── STATE ─────────────────────────────────────────────────────────
let sb, allStudents = [], filtered = [], sortDir = {col:'progress', dir:-1};

// ── INIT ──────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  sb = window.supabase.createClient(SB_URL, SB_KEY);

  // Auth guard — only instructors
  const { data: { user } } = await sb.auth.getUser();
  if (!user) { location.href = 'login.html'; return; }

  const { data: profile } = await sb.from('profiles').select('role,full_name').eq('id', user.id).single();
  if (!profile || !['instructor','admin'].includes(profile.role)) {
    document.querySelector('main').innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔒</div>
        <h2 style="color:#fff;font-family:var(--fhead);font-size:1.8rem">ACCESS RESTRICTED</h2>
        <p style="margin-top:8px">This dashboard is for instructors only.</p>
        <a href="dashboard.html" class="btn btn-primary" style="margin-top:24px;display:inline-flex">← Back to Dashboard</a>
      </div>`;
    return;
  }

  loadAllStudents();
});

// ── LOAD DATA ─────────────────────────────────────────────────────
async function loadAllStudents() {
  document.getElementById('student-tbody').innerHTML =
    '<tr class="loading-row"><td colspan="7"><div class="spinner"></div></td></tr>';

  try {
    // Get all profiles (non-instructor) + their progress summaries
    const [profilesRes, progressRes] = await Promise.all([
      sb.from('profiles').select('id,full_name,email,created_at').neq('role','instructor').neq('role','admin'),
      sb.from('user_progress_summary').select('user_id,progress_data,updated_at'),
    ]);

    const profiles  = profilesRes.data  || [];
    const progress  = progressRes.data  || [];

    // Map progress by user_id
    const progMap = {};
    progress.forEach(p => { progMap[p.user_id] = p; });

    // Build student objects
    allStudents = profiles.map(p => {
      const prog  = progMap[p.id] || null;
      const data  = prog?.progress_data || {};
      const lastActive = prog?.updated_at || null;

      // Calculate per-course completions
      const courses = {};
      let totalDone = 0, totalPossible = 0;
      Object.entries(COURSES).forEach(([cid, info]) => {
        const done = Object.values(data[cid] || {}).flat().length;
        courses[cid] = { done, total: info.total, pct: Math.round(done / info.total * 100) };
        totalDone     += done;
        totalPossible += info.total;
      });

      const overallPct = Math.round(totalDone / totalPossible * 100);
      const daysSince  = lastActive
        ? Math.floor((Date.now() - new Date(lastActive)) / 86400000)
        : 999;
      const status = !lastActive ? 'new'
                   : daysSince <= 7 ? 'active'
                   : 'idle';

      return {
        id: p.id, name: p.full_name || 'Unknown', email: p.email || '—',
        enrolled: p.created_at, lastActive, daysSince,
        courses, overallPct, totalDone, status,
        rawProgress: data,
      };
    });

    filtered = [...allStudents];
    renderStats();
    renderTable();
    document.getElementById('sub-text').textContent =
      `${allStudents.length} students enrolled · last refreshed ${new Date().toLocaleTimeString()}`;

  } catch(err) {
    document.getElementById('student-tbody').innerHTML =
      `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--danger)">⚠️ Error loading data: ${err.message}</td></tr>`;
  }
}

// ── STATS ─────────────────────────────────────────────────────────
function renderStats() {
  const total    = allStudents.length;
  const active   = allStudents.filter(s => s.status === 'active').length;
  const avgComp  = total ? Math.round(allStudents.reduce((a,s) => a + s.overallPct, 0) / total) : 0;
  const completed = allStudents.filter(s => s.overallPct === 100).length;
  const lessons  = allStudents.reduce((a,s) => a + s.totalDone, 0);

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-active').textContent = active;
  document.getElementById('s-avg').innerHTML = `${avgComp}<span>%</span>`;
  document.getElementById('s-complete').textContent = completed;
  document.getElementById('s-lessons').textContent = lessons;
}

// ── TABLE RENDER ──────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('student-tbody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">🎓</div><p>No students match your filters.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(s => {
    const initials = s.name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || '??';
    const enrolled = s.enrolled ? new Date(s.enrolled).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const lastSeen = s.lastActive
      ? (s.daysSince === 0 ? 'Today' : s.daysSince === 1 ? 'Yesterday' : `${s.daysSince}d ago`)
      : 'Never';
    const statusMap = {active:'status-active',idle:'status-idle',new:'status-new'};
    const statusLabel = {active:'● Active',idle:'○ Idle',new:'✦ New'};

    // Course progress mini-bars (show top 3 most progressed)
    const topCourses = Object.entries(s.courses)
      .filter(([,v]) => v.pct > 0)
      .sort((a,b) => b[1].pct - a[1].pct)
      .slice(0,3);

    const barsHtml = topCourses.length
      ? topCourses.map(([cid,v]) => `
          <div class="prog-row">
            <span class="course-label" style="width:12px">${COURSES[cid].icon}</span>
            <div class="prog-bar-wrap">
              <div class="prog-bar-fill" style="width:${v.pct}%;background:${COURSES[cid].color}"></div>
            </div>
            <span class="prog-pct">${v.pct}%</span>
          </div>`).join('')
      : '<span style="color:var(--txtd);font-size:.78rem;font-family:var(--fmono)">No activity yet</span>';

    const fillColor = s.overallPct >= 80 ? 'var(--ok)' : s.overallPct >= 40 ? 'var(--blue)' : 'var(--warn)';

    return `<tr onclick="openDrawer('${s.id}')" style="cursor:pointer">
      <td>
        <div class="student-cell">
          <div class="avatar">${initials}</div>
          <div>
            <div class="student-name">${esc(s.name)}</div>
            <div class="student-email">${esc(s.email)}</div>
          </div>
        </div>
      </td>
      <td style="color:var(--txtm);font-size:.82rem">${enrolled}</td>
      <td class="prog-cell">
        <div class="overall-bar">
          <div class="overall-track">
            <div class="overall-fill" style="width:${s.overallPct}%;background:${fillColor}"></div>
          </div>
          <span class="overall-pct" style="color:${fillColor}">${s.overallPct}%</span>
        </div>
        <div style="font-size:.72rem;color:var(--txtd);margin-top:4px;font-family:var(--fmono)">${s.totalDone} lessons complete</div>
      </td>
      <td class="prog-cell">${barsHtml}</td>
      <td style="color:var(--txtm);font-size:.82rem;font-family:var(--fmono)">${lastSeen}</td>
      <td><span class="status ${statusMap[s.status]}">${statusLabel[s.status]}</span></td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="export-btn" onclick="event.stopPropagation();openDrawer('${s.id}')">View →</button>
        <button class="export-btn" style="background:rgba(0,230,118,.08);border-color:rgba(0,230,118,.25);color:var(--ok)" onclick="grantAllAccess('${s.id}',event)" title="Grant full access to all courses">✅ Grant</button>
      </td>
    </tr>`;
  }).join('');
}

// ── FILTER & SORT ─────────────────────────────────────────────────
function filterTable() {
  const q       = document.getElementById('search-inp').value.toLowerCase();
  const course  = document.getElementById('course-filter').value;
  const status  = document.getElementById('status-filter').value;

  filtered = allStudents.filter(s => {
    const matchQ  = !q || s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q);
    const matchC  = !course || s.courses[course]?.pct > 0;
    const matchS  = !status || s.status === status;
    return matchQ && matchC && matchS;
  });
  applySort();
  renderTable();
}

function sortBy(col) {
  if (sortDir.col === col) sortDir.dir *= -1;
  else { sortDir.col = col; sortDir.dir = -1; }
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
  });
  applySort();
  renderTable();
}

function applySort() {
  filtered.sort((a,b) => {
    let va, vb;
    switch(sortDir.col) {
      case 'name':     va = a.name; vb = b.name; break;
      case 'enrolled': va = a.enrolled||''; vb = b.enrolled||''; break;
      case 'last':     va = a.lastActive||''; vb = b.lastActive||''; break;
      default:         va = a.overallPct; vb = b.overallPct;
    }
    if (va < vb) return sortDir.dir;
    if (va > vb) return -sortDir.dir;
    return 0;
  });
}

// ── DRAWER ────────────────────────────────────────────────────────
function openDrawer(userId) {
  const s = allStudents.find(x => x.id === userId);
  if (!s) return;

  const initials = s.name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || '??';
  document.getElementById('d-avatar').textContent = initials;
  document.getElementById('d-name').textContent   = s.name;
  document.getElementById('d-email').textContent  = s.email;

  const enrolled = s.enrolled ? new Date(s.enrolled).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : 'Unknown';
  document.getElementById('d-meta').innerHTML = `
    <span class="meta-chip">📅 Joined ${enrolled}</span>
    <span class="meta-chip">📚 ${s.totalDone} lessons</span>
    <span class="meta-chip">🎯 ${s.overallPct}% overall</span>`;

  // Course cards
  const courseCards = Object.entries(COURSES).map(([cid, info]) => {
    const cv = s.courses[cid];
    return `
      <div class="course-card">
        <div class="course-card-head">
          <span class="course-card-name">${info.icon} ${info.name}</span>
          <span class="course-card-pct" style="color:${info.color}">${cv.pct}%</span>
        </div>
        <div class="course-track">
          <div class="course-fill" style="width:${cv.pct}%;background:${info.color}"></div>
        </div>
        <div style="font-size:.78rem;color:var(--txtd);font-family:var(--fmono)">${cv.done} / ${cv.total} lessons complete</div>
      </div>`;
  }).join('');

  // Activity timeline from raw progress data
  const timeline = buildTimeline(s.rawProgress, s.lastActive);

  // Load access state for this student
  const accessData = await loadStudentAccess(s.id);

  document.getElementById('drawer-body').innerHTML = `
    <div class="section-title">COURSE PROGRESS</div>
    ${courseCards}
    <div class="section-title">ACCESS & PAYMENTS</div>
    <p style="color:var(--txtm);font-size:.85rem;margin-bottom:14px">
      Toggle to grant or revoke paid access for each course. Students are notified immediately.
    </p>
    <div class="access-grid" id="access-grid-${s.id}">
      ${buildAccessCards(s.id, accessData)}
    </div>
    <button class="save-access-btn" onclick="saveAccess('${s.id}')">💾 Save Access Changes</button>
    <div class="access-saving" id="access-saving-${s.id}"></div>
    <div class="section-title" style="margin-top:24px">COMPLETION DETAIL</div>
    ${buildLessonGrid(s.rawProgress)}
    <div class="section-title">ACTIVITY</div>
    <ul class="timeline">${timeline}</ul>
    <div style="margin-top:24px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="export-btn" onclick="exportStudentCSV('${s.id}')">⬇ Export This Student</button>
    </div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function buildLessonGrid(rawProgress) {
  return Object.entries(COURSES).map(([cid, info]) => {
    const mods = rawProgress[cid] || {};
    const dots = Object.entries(mods).map(([mid, lids]) =>
      lids.map(lid => `<div class="dot done" title="${mid}/${lid}"></div>`).join('')
    ).join('');
    const done  = Object.values(mods).flat().length;
    return `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <span style="font-size:.75rem;color:var(--txtd);font-family:var(--fmono);min-width:22px">${info.icon}</span>
        <div style="display:flex;flex-wrap:wrap;gap:4px;flex:1">${dots || '<span style="color:var(--txtd);font-size:.72rem;font-family:var(--fmono)">No lessons completed</span>'}</div>
        <span style="font-family:var(--fmono);font-size:.72rem;color:var(--txtm);min-width:40px;text-align:right">${done}/${info.total}</span>
      </div>`;
  }).join('');
}

function buildTimeline(rawProgress, lastActive) {
  const events = [];
  Object.entries(COURSES).forEach(([cid, info]) => {
    const done = Object.values(rawProgress[cid] || {}).flat().length;
    if (done > 0) events.push({ label: `Completed ${done} lesson${done>1?'s':''} in <strong>${info.name}</strong>` });
  });

  if (!events.length) return '<li class="tl-item"><div class="tl-text" style="color:var(--txtd)">No activity recorded yet</div></li>';

  const lastStr = lastActive
    ? new Date(lastActive).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
    : 'Unknown';

  return events.map(e => `
    <li class="tl-item">
      <div class="tl-time">${lastStr}</div>
      <div class="tl-text">${e.label}</div>
    </li>`).join('') + `
    <li class="tl-item">
      <div class="tl-time">Enrolled</div>
      <div class="tl-text">Student joined FMM Academy</div>
    </li>`;
}

// ── EXPORT ────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['Name','Email','Enrolled','Last Active','Overall %','Status',
    ...Object.values(COURSES).map(c => c.name + ' %')]];
  filtered.forEach(s => {
    rows.push([
      s.name, s.email,
      s.enrolled ? new Date(s.enrolled).toLocaleDateString() : '',
      s.lastActive ? new Date(s.lastActive).toLocaleDateString() : 'Never',
      s.overallPct, s.status,
      ...Object.keys(COURSES).map(cid => s.courses[cid].pct),
    ]);
  });
  downloadCSV(rows, 'fmm-student-progress.csv');
}

function exportStudentCSV(userId) {
  const s = allStudents.find(x => x.id === userId);
  if (!s) return;
  const rows = [['Course','Lessons Done','Total','Percentage']];
  Object.entries(COURSES).forEach(([cid,info]) => {
    const cv = s.courses[cid];
    rows.push([info.name, cv.done, cv.total, cv.pct + '%']);
  });
  downloadCSV(rows, `${s.name.replace(/\s+/g,'-').toLowerCase()}-progress.csv`);
}

function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = filename;
  a.click();
}

// ── UTIL ──────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


// ════════════════════════════════════════════════════════════════
// ACCESS MANAGEMENT
// ════════════════════════════════════════════════════════════════
const COURSE_INFO = {
  'web-dev':   { name:'Website Dev',    icon:'🌐', tier:'Advanced',     price:10000 },
  'wordpress': { name:'WordPress',      icon:'🔷', tier:'Intermediate', price:5000  },
  'seo':       { name:'SEO Mastery',    icon:'🔍', tier:'Intermediate', price:5000  },
  'hosting':   { name:'Hosting',        icon:'🖥️', tier:'Beginner',     price:3000  },
  'ecommerce': { name:'E-Commerce',     icon:'🛒', tier:'Advanced',     price:10000 },
};

let pendingAccess = {}; // { userId: { 'web-dev': true/false, ... } }

async function loadStudentAccess(userId) {
  try {
    const { data } = await sb.from('course_access')
      .select('course_id, granted')
      .eq('user_id', userId);
    const map = {};
    (data || []).forEach(r => { map[r.course_id] = r.granted; });
    return map;
  } catch(e) { return {}; }
}

function buildAccessCards(userId, accessMap) {
  return Object.entries(COURSE_INFO).map(([cid, info]) => {
    const granted = !!accessMap[cid];
    return `
      <div class="access-card">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="access-card-icon">${info.icon}</span>
          <span class="access-card-name">${info.name}</span>
        </div>
        <div class="access-toggle" onclick="toggleAccess('${userId}','${cid}',this)">
          <span class="access-status ${granted?'paid':'free'}" id="acc-status-${userId}-${cid}">${granted?'✅ Access Granted':'⛔ Locked'}</span>
          <div class="toggle-track ${granted?'on':''}" id="acc-toggle-${userId}-${cid}">
            <div class="toggle-thumb"></div>
          </div>
        </div>
        <div style="font-family:var(--fmono);font-size:.68rem;color:var(--txtd)">
          ${info.tier} · KES ${info.price.toLocaleString()}
        </div>
      </div>`;
  }).join('');
}

function toggleAccess(userId, courseId, el) {
  const track  = document.getElementById(`acc-toggle-${userId}-${courseId}`);
  const status = document.getElementById(`acc-status-${userId}-${courseId}`);
  const isOn   = track.classList.contains('on');

  if (isOn) {
    track.classList.remove('on');
    status.textContent = '⛔ Locked';
    status.className = 'access-status free';
  } else {
    track.classList.add('on');
    status.textContent = '✅ Access Granted';
    status.className = 'access-status paid';
  }

  if (!pendingAccess[userId]) pendingAccess[userId] = {};
  pendingAccess[userId][courseId] = !isOn;
}

async function saveAccess(userId) {
  const saving = document.getElementById(`access-saving-${userId}`);
  const pending = pendingAccess[userId];
  if (!pending || Object.keys(pending).length === 0) {
    saving.textContent = 'No changes to save.';
    setTimeout(() => saving.textContent = '', 2000);
    return;
  }

  saving.textContent = '⏳ Saving…';
  try {
    const upserts = Object.entries(pending).map(([cid, granted]) => ({
      user_id: userId, course_id: cid, granted,
      updated_at: new Date().toISOString(),
    }));
    const { error } = await sb.from('course_access').upsert(upserts, { onConflict: 'user_id,course_id' });
    if (error) throw error;

    // Update local student record
    const student = allStudents.find(s => s.id === userId);
    if (student) Object.assign(student.access || (student.access = {}), pending);

    pendingAccess[userId] = {};
    saving.textContent = '✅ Access saved! Student can now proceed.';
    setTimeout(() => saving.textContent = '', 4000);

    // Refresh stats
    loadAllStudents();
  } catch(err) {
    saving.textContent = '❌ Error: ' + err.message;
  }
}

// Quick grant all access button from table row
async function grantAllAccess(userId, event) {
  event.stopPropagation();
  const { error } = await sb.from('course_access').upsert(
    Object.keys(COURSE_INFO).map(cid => ({
      user_id: userId, course_id: cid, granted: true,
      updated_at: new Date().toISOString(),
    })),
    { onConflict: 'user_id,course_id' }
  );
  if (!error) {
    showGrantToast('✅ Full access granted!');
    loadAllStudents();
  }
}

function showGrantToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;padding:12px 28px;border-radius:100px;font-family:"JetBrains Mono",monospace;font-size:.84rem;font-weight:700;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.4)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Close drawer on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
